<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 像素騎士</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Consolas', monospace; }
        canvas { display: block; background: #87CEEB; image-rendering: pixelated; /* 核心：保持像素清晰 */ }
        
        /* HUD 資訊欄漂亮化 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.5); border-bottom: 2px solid #555; color: white; padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; text-shadow: 2px 2px 0 #000; }
        .pts-icon { color: #ffca28; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div>👤 遠征隊員: <span id="p-name">載入中</span></div>
    <div>💖 生命: <span id="hp-val">20</span> / 20</div>
    <div><span class="pts-icon">🟡 SUPER 點數:</span> <span id="pts-val">0</span> | <span id="time-tag">☀️ 白天</span></div>
</nav>

<canvas id="game"></canvas>

<script>
    // --- 核心：定義漂亮的像素藝術素材 ---
    // (這裡使用 Canvas 繪製模擬，實際開發建議使用 Image 加載)
    const sprites = {
        player: { color: '#3498db', head: '#f1c40f' }, // 藍鎧甲、黃頭盔
        mate: ['#e74c3c', '#2ecc71', '#f39c12'], // 紅、綠、黃衣服隊友
        zombie: { body: '#27ae60', eye: '#ff0000' },
        blocks: {
            grass: ['#2ecc71', '#27ae60', '#1e8449'], // 多重草色
            dirt: ['#8b5a2b', '#6e4a20'],
            tnt: ['#ff0000', '#ffffff'],
            lava: ['#e67e22', '#ff4500']
        }
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false, hp: 20, dead: false };
    let world = {}, entities = [], keys = {}, selected = 'grass', gameTime = 0;
    let camera = { x: 0, y: 0 }, superPts = parseInt(localStorage.getItem('super_points')) || 0;
    let particles = []; // 粒子特效數組

    const params = new URLSearchParams(window.location.search);
    const botCount = Math.min(parseInt(params.get('players')) || 2, 50);
    document.getElementById('p-name').innerText = localStorage.getItem('mc_user') || "冒險者";

    // --- 漂亮生成：粒子效果 ---
    function spawnParticle(x, y, color, count=5) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random()-0.5) * 8,
                vy: (Math.random()-0.5) * 8 - 4,
                color: color,
                life: 30 + Math.random()*20
            });
        }
    }

    // 地形生成與填滿
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let gy = Math.floor(12 + Math.sin(x * 0.1) * 5); 
        world[gx] = {};
        for(let y = gy; y < gy + 30; y++) {
            let type = (y === gy) ? 'grass' : (y < gy + 4 ? 'dirt' : 'stone');
            if (y > gy + 20 && Math.random() < 0.08) type = 'lava';
            world[gx][y * blockSize] = type;
        }
    }

    for(let i=0; i<botCount-1; i++) entities.push({ x:400+i*35, y:-200, vx:0, vy:0, type:'mate', w:24, h:36 });

    // --- 互動：挖掘與建築 (漂亮粒子) ---
    canvas.onmousedown = e => {
        let mx = Math.floor((e.clientX + camera.x) / blockSize) * blockSize;
        let my = Math.floor((e.clientY + camera.y) / blockSize) * blockSize;
        
        if(e.button === 0 && world[mx] && world[mx][my]) {
            spawnParticle(mx+20, my+20, sprites.blocks[world[mx][my]]?.[0] || '#7f8c8d');
            delete world[mx][my];
        } else if(e.button === 2) {
            if(!world[mx]) world[mx] = {};
            world[mx][my] = selected;
            spawnParticle(mx+20, my+20, '#fff', 2); // 放置粒子
        }
    };
    canvas.oncontextmenu = e => e.preventDefault();

    // 禁止穿牆物理
    function applyPhysics(obj) {
        obj.vy += 0.8; 
        let nextX = obj.x + (obj.vx || 0);
        let nextY = obj.y + obj.vy;

        let gxSide = Math.floor((obj.vx > 0 ? nextX + 24 : nextX) / blockSize) * blockSize;
        let gyMid = Math.floor((obj.y + 18) / blockSize) * blockSize;
        if (!(world[gxSide] && world[gxSide][gyMid])) obj.x = nextX;

        let gx = Math.floor((obj.x + 12) / blockSize) * blockSize;
        let gy = Math.floor((nextY + 36) / blockSize) * blockSize;
        if (world[gx] && world[gx][gy]) {
            obj.y = gy - 36; obj.vy = 0; obj.g = true;
        } else { obj.y = nextY; obj.g = false; }
    }

    // --- 核心：漂亮繪圖邏輯 (像素與光影) ---
    function drawPixelBlock(ctx, x, y, colors) {
        ctx.fillStyle = colors[0];
        ctx.fillRect(x, y, blockSize-1, blockSize-1);
        // 加入像素雜點
        ctx.fillStyle = colors[1] || colors[0];
        if(Math.random()<0.3) ctx.fillRect(x+5, y+5, 10, 10);
        if(Math.random()<0.3) ctx.fillRect(x+25, y+25, 10, 10);
    }

    function drawPixelEntity(ctx, x, y, w, h, sprite) {
        ctx.fillStyle = sprite.body || sprite;
        ctx.fillRect(x, y, w, h);
        if(sprite.head) {
            ctx.fillStyle = sprite.head;
            ctx.fillRect(x+4, y, 16, 12); // 畫頭盔
        }
    }

    function loop() {
        gameTime++;
        let isNight = (gameTime % 2400) > 1200;
        document.getElementById('time-tag').innerText = isNight ? "🌙 夜晚" : "☀️ 白天";

        // 怪物生成與消失
        if (isNight && Math.random() < 0.03) {
            entities.push({ x: player.x + (Math.random() > 0.5 ? 400 : -400), y: -100, vx: 0, vy: 0, type: 'zombie', w: 24, h: 36 });
        }
        if (!isNight) entities = entities.filter(en => en.type !== 'zombie');

        player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
        if((keys['Space'] || keys['KeyW']) && player.g) player.vy = -14;
        applyPhysics(player);

        entities.forEach(en => applyPhysics(en));

        // 更新粒子
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        });

        superPts++; 
        document.getElementById('pts-val').innerText = superPts;
        document.getElementById('coords').innerText = `X: ${Math.round(player.x)}, Y: ${Math.round(-player.y)}`;
        for(let i=player.x-800; i<player.x+800; i+=blockSize) genTerrain(Math.floor(i/blockSize)*blockSize);

        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // 渲染畫布 (晝夜光影)
        ctx.fillStyle = isNight ? "#1a1a2e" : "#87CEEB";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        
        // 畫地型 (漂亮像素)
        for(let x in world) for(let y in world[x]) {
            let t = world[x][y];
            drawPixelBlock(ctx, parseInt(x), parseInt(y), sprites.blocks[t] || ['#7f8c8d', '#95a5a6']);
        }
        
        // 畫粒子
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });

        // 畫隊友
        entities.forEach((e, i) => {
            if(e.type === 'mate') drawPixelEntity(ctx, e.x, e.y, e.w, e.h, sprites.mate[i%3]);
            else drawPixelEntity(ctx, e.x, e.y, e.w, e.h, sprites.zombie);
        });
        
        // 畫玩家 (漂亮騎士)
        drawPixelEntity(ctx, player.x, player.y, player.w, player.h, sprites.player);
        
        // --- 核心：夜晚漂亮光影 ---
        if(isNight) {
            ctx.globalCompositeOperation = 'destination-out'; // 在黑夜中扣除光圈
            let gradient = ctx.createRadialGradient(player.x+12, player.y+18, 0, player.x+12, player.y+18, 200);
            gradient.addColorStop(0, "rgba(255, 202, 40, 1)"); // 中心亮黃色
            gradient.addColorStop(1, "rgba(0, 0, 0, 0)"); // 邊緣透明
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.arc(player.x+12, player.y+18, 200, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over'; // 恢復正常模式
        }
        
        ctx.restore();
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
