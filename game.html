<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界：無限延伸地圖</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 10px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        #coord { font-family: monospace; color: #2ecc71; }
    </style>
</head>
<body>

<nav>
    <div>👤 遠征隊員: <span id="user-nm"></span></div>
    <div id="coord">X: 0, Y: 0 (區域載入中...)</div>
</nav>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    // 玩家與世界設定
    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false };
    let world = {}; // 用來存放所有生成的方塊數據
    let camera = { x: 0, y: 0 };
    let keys = {};

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    document.getElementById('user-nm').innerText = localStorage.getItem('mc_user') || "冒險者";

    // --- 核心技術：隨機噪聲地形生成 ---
    // 這讓地形看起來像真的山脈，而不是亂跳的方塊
    function generateTerrainAt(gx) {
        if (world[gx]) return; // 如果已經生成過，就跳過

        // 使用多重 Sine 波組合，模擬 Minecraft 的隨機地形 (Noise)
        const x = gx / blockSize;
        let height = 12; // 基礎地平線高度
        height += Math.sin(x * 0.1) * 5;  // 大山脈起伏
        height += Math.sin(x * 0.5) * 2;  // 小丘陵起伏
        height += Math.cos(x * 0.02) * 8; // 長距離生物群系變化
        
        let groundY = Math.floor(height);
        
        world[gx] = {};
        // 生成地表與地底
        for(let y = groundY; y < groundY + 15; y++) {
            let ty = y * blockSize;
            if (y === groundY) world[gx][ty] = 'grass';
            else if (y < groundY + 4) world[gx][ty] = 'dirt';
            else world[gx][ty] = 'stone';
        }

        // 隨機生成樹木 (Minecraft 規則)
        if (Math.random() < 0.05 && !world[gx][(groundY-1)*blockSize]) {
            createTree(gx, groundY);
        }
    }

    function createTree(gx, gy) {
        for(let i=1; i<=3; i++) world[gx][(gy-i)*blockSize] = 'log'; // 樹幹
        world[gx][(gy-4)*blockSize] = 'leaves'; // 樹葉
    }

    // --- 物理與移動 ---
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        player.vx = (keys['KeyD'] ? 6 : 0) + (keys['KeyA'] ? -6 : 0);
        player.x += player.vx;
        player.vy += 0.8;
        player.y += player.vy;

        // 碰撞偵測
        let gx = Math.floor(player.x / blockSize) * blockSize;
        let gy = Math.floor((player.y + player.h) / blockSize) * blockSize;

        if (world[gx] && world[gx][gy]) {
            player.y = gy - player.h;
            player.vy = 0;
            player.g = true;
        } else {
            player.g = false;
        }

        if (keys['Space'] && player.g) {
            player.vy = -13;
            player.g = false;
        }

        // 攝影機鎖定玩家
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // --- 核心技術：動態區域加載 (Chunk Loading) ---
        // 只生成玩家畫面附近 2000 像素內的方塊，確保永遠有路，且不佔記憶體
        for(let x = player.x - 1200; x < player.x + 1200; x += blockSize) {
            generateTerrainAt(Math.floor(x / blockSize) * blockSize);
        }
    }

    function draw() {
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 只繪製畫面看得見的方塊 (優化效能)
        let viewLeft = Math.floor(camera.x / blockSize) * blockSize;
        let viewRight = viewLeft + canvas.width + blockSize;

        for (let x = viewLeft; x <= viewRight; x += blockSize) {
            if (world[x]) {
                for (let y in world[x]) {
                    let type = world[x][y];
                    if (type === 'grass') ctx.fillStyle = '#2ecc71';
                    else if (type === 'dirt') ctx.fillStyle = '#8b5a2b';
                    else if (type === 'stone') ctx.fillStyle = '#7f8c8d';
                    else if (type === 'log') ctx.fillStyle = '#6d4c41';
                    else if (type === 'leaves') ctx.fillStyle = '#27ae60';
                    
                    ctx.fillRect(x, parseInt(y), blockSize - 1, blockSize - 1);
                }
            }
        }

        // 畫玩家
        ctx.fillStyle = "#fff";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        document.getElementById('coord').innerText = `X: ${Math.round(player.x)}, Y: ${Math.round(-player.y)}`;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
