<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 穩定版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #1e90ff; }
        /* 介面樣式 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 10px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        /* 聊天室樣式 */
        #chat-ui { position: fixed; bottom: 40px; left: 20px; display: none; z-index: 200; }
        #chat-log { width: 320px; height: 120px; background: rgba(0,0,0,0.4); color: white; padding: 10px; overflow-y: auto; border-radius: 5px; font-size: 14px; margin-bottom: 5px; backdrop-filter: blur(5px); }
        #chat-input { width: 320px; padding: 10px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #555; outline: none; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">👤 載入中...</div>
    <div style="color: #ffff00;">按 T 開啟聊天 (電腦隊友會在線回覆)</div>
    <div id="coord">X: 0, Y: 0</div>
</nav>

<div id="chat-ui">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" placeholder="說點什麼... (Enter 發送)">
</div>

<canvas id="game"></canvas>

<script>
    const user = localStorage.getItem('mc_user') || "冒險者";
    const mode = "multi"; // 強制開啟多人模擬測試
    document.getElementById('p-info').innerText = `🌍 ${user}`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const chatUI = document.getElementById('chat-ui');
    const chatInput = document.getElementById('chat-input');
    const chatLog = document.getElementById('chat-log');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const blockSize = 40;
    let isChatting = false;
    let world = {}, keys = {}, camera = { x: 0, y: 0 };
    let player = { x: 400, y: -200, w: 24, h: 34, vx: 0, vy: 0, g: false };

    // --- 聊天系統邏輯 ---
    const aiWords = ["這座山超高！", "你有鑽石劍嗎？", "我剛看到一隻羊", "你好啊 " + user, "不要飄到空中喔哈哈", "按 ESC 可以存檔"];

    window.onkeydown = e => {
        if (e.key.toLowerCase() === 't' && !isChatting) {
            e.preventDefault();
            isChatting = true;
            chatUI.style.display = 'block';
            chatInput.focus();
        } else if (e.key === 'Enter' && isChatting) {
            const msg = chatInput.value.trim();
            if(msg) {
                addChat(user, msg);
                // AI 回覆模擬
                setTimeout(() => {
                    const reply = aiWords[Math.floor(Math.random()*aiWords.length)];
                    addChat("電腦隊友", reply, "#58a6ff");
                }, 800);
            }
            chatInput.value = "";
            isChatting = false;
            chatUI.style.display = 'none';
        } else if (e.key === 'Escape' && isChatting) {
            isChatting = false;
            chatUI.style.display = 'none';
        }
        if (!isChatting) keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    function addChat(who, txt, color="#fff") {
        chatLog.innerHTML += `<div><span style="color:${color}">${who}:</span> ${txt}</div>`;
        chatLog.scrollTop = chatLog.scrollHeight;
        chatUI.style.display = 'block'; // 顯示一下對話框
    }

    // --- 物理與地圖生成 (防飄浮版) ---
    function generate(x) {
        const ix = Math.floor(x / blockSize) * blockSize;
        if (world[ix]) return;
        let gy = Math.floor(12 + Math.sin(ix * 0.01) * 8);
        world[ix] = gy * blockSize;
    }

    function loop() {
        if (!isChatting) {
            // 移動
            player.vx = (keys['KeyD'] ? 6 : 0) + (keys['KeyA'] ? -6 : 0);
            player.x += player.vx;

            // 重力與防飄浮核心
            player.vy += 0.7;
            player.y += player.vy;

            // 抓取當前地表高度
            generate(player.x);
            let ground = world[Math.floor(player.x / blockSize) * blockSize];

            // 落地判定
            if (player.y + player.h > ground) {
                player.y = ground - player.h;
                player.vy = 0;
                player.g = true;
            } else {
                player.g = false;
            }

            // --- 強制降落機制 ---
            // 如果玩家飛超過高度 (例如 Y < -2000)，強制拉回地表
            if (player.y < -2000 || isNaN(player.y)) {
                player.y = -300; player.vy = 0;
                console.log("偵測到異常飄浮，已啟動強制降落！");
            }

            if ((keys['Space'] || keys['KeyW']) && player.g) {
                player.vy = -13;
                player.g = false;
            }
        }

        // 攝影機鎖定
        camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

        // 渲染
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        // 畫地形
        for (let x = Math.floor((player.x - 1000) / blockSize) * blockSize; x < player.x + 1000; x += blockSize) {
            generate(x);
            ctx.fillStyle = "#2ed573";
            ctx.fillRect(x, world[x], blockSize - 1, 600);
        }

        // 畫玩家
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        document.getElementById('coord').innerText = `X: ${Math.round(player.x)}, Y: ${Math.round(-player.y)}`;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
