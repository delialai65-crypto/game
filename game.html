<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #1e90ff; }
        #chat { position: fixed; bottom: 80px; left: 20px; width: 300px; height: 120px; background: rgba(0,0,0,0.4); color: white; padding: 10px; display: none; overflow-y: auto; }
        #ci { position: fixed; bottom: 50px; left: 20px; width: 300px; padding: 8px; background: #000; color: #fff; border: 1px solid #555; display: none; }
        #esc-menu { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 1000; }
    </style>
</head>
<body>
<div id="chat"></div><input type="text" id="ci">
<div id="esc-menu">
    <h1>選單</h1>
    <button onclick="toggleEsc()" style="padding:15px 40px">返回遊戲</button>
    <div style="margin-top:20px">🛒 商店：<button onclick="alert('鑽石劍已裝備')">💎 鑽石劍 ($500)</button></div>
</div>
<canvas id="game"></canvas>
<script>
    const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let isT = false, isE = false;
    let p = { x: 400, y: 300, w: 24, h: 34, vy: 0 };
    const aiResp = ["你好啊！", "這山好高", "小心殭屍", "有鑽石嗎？"];

    window.onkeydown = e => {
        if(e.key.toLowerCase()==='t' && !isT) { isT=true; document.getElementById('chat').style.display='block'; document.getElementById('ci').style.display='block'; document.getElementById('ci').focus(); }
        if(e.key==='Enter' && isT) {
            let m = document.getElementById('ci').value;
            if(m) { 
                addC("你", m);
                setTimeout(()=>addC("電腦", aiResp[Math.floor(Math.random()*4)], "#58a6ff"), 800);
            }
            document.getElementById('ci').value=""; isT=false; document.getElementById('ci').style.display='none';
        }
        if(e.key==='Escape') toggleEsc();
    };

    function toggleEsc(){ isE=!isE; document.getElementById('esc-menu').style.display=isE?'flex':'none'; }
    function addC(w,t,c="#fff"){ const l=document.getElementById('chat'); l.innerHTML+=`<div><span style="color:${c}">${w}:</span> ${t}</div>`; l.scrollTop=l.scrollHeight; }

    function loop(){
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#2ed573"; ctx.fillRect(0, 500, canvas.width, 100);
        ctx.fillStyle = "white"; ctx.fillRect(p.x, p.y, p.w, p.h);
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
