<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #1e90ff; }
        
        /* 聊天室：左下角 */
        #chat-box { position: fixed; bottom: 80px; left: 20px; width: 350px; height: 150px; background: rgba(0,0,0,0.4); color: white; padding: 10px; overflow-y: auto; display: none; font-size: 14px; text-shadow: 1px 1px #000; }
        #chat-input { position: fixed; bottom: 45px; left: 20px; width: 350px; padding: 8px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #555; display: none; outline: none; }
        
        /* ESC 選單：畫面中央 */
        #esc-menu { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .esc-btn { width: 300px; padding: 15px; margin: 10px; background: #4e4e4e; color: white; border: 2px solid #fff; cursor: pointer; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="chat-box"></div>
<input type="text" id="chat-input" placeholder="按 Enter 發送訊息...">

<div id="esc-menu">
    <h1 style="color:white">遊戲暫停</h1>
    <div class="esc-btn" onclick="toggleESC()">回到遊戲</div>
    <div class="esc-btn" onclick="location.href='main-menu.html'">儲存並離開</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let player = { x: 400, y: 300, w: 24, h: 36, vx: 0, vy: 0 };
    let keys = {}, isESC = false, isT = false;
    let bots = [];

    // 取得人數設定
    const params = new URLSearchParams(window.location.search);
    const playerCount = parseInt(params.get('players')) || 1;

    // 初始化多人 (生成隊友)
    for(let i=0; i<playerCount-1; i++) {
        bots.push({ x: Math.random()*canvas.width, y: 300, name: "玩家_"+(i+1) });
    }

    // 鍵盤監聽
    window.onkeydown = e => {
        if(e.code === 'Escape') toggleESC();
        if(e.code === 'KeyT' && !isESC && !isT) toggleChat(true);
        if(e.code === 'Enter' && isT) sendMsg();
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    function toggleESC() {
        isESC = !isESC;
        document.getElementById('esc-menu').style.display = isESC ? 'flex' : 'none';
    }

    function toggleChat(open) {
        isT = open;
        document.getElementById('chat-box').style.display = open ? 'block' : 'none';
        document.getElementById('chat-input').style.display = open ? 'block' : 'none';
        if(open) document.getElementById('chat-input').focus();
    }

    function sendMsg() {
        let val = document.getElementById('chat-input').value;
        if(val) {
            let log = document.getElementById('chat-box');
            log.innerHTML += `<div><span style="color:#2ecc71">我:</span> ${val}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        document.getElementById('chat-input').value = "";
        toggleChat(false);
    }

    function loop() {
        if(!isESC && !isT) {
            // --- 核心規則：穿牆與移動 ---
            if(keys['KeyD']) player.x += 6;
            if(keys['KeyA']) player.x -= 6;
            if(keys['KeyW'] || keys['Space']) player.y -= 6; // 向上飛 (穿牆)
            if(keys['KeyS']) player.y += 6; // 向下鑽 (穿牆)
        }

        // 繪圖
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 畫地平線 (參考用)
        ctx.fillStyle = "rgba(46, 213, 115, 0.5)";
        ctx.fillRect(0, 400, canvas.width, 100);

        // 畫多人隊友
        ctx.fillStyle = "#d35400";
        bots.forEach(b => {
            ctx.fillRect(b.x, b.y, 24, 36);
            ctx.fillStyle = "white"; ctx.fillText(b.name, b.x, b.y-5);
        });

        // 畫玩家本人
        ctx.fillStyle = "white";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
