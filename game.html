<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界 - 核心修復版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        /* 確保畫布撐滿全螢幕 */
        canvas { display: block; background: #1e90ff; width: 100vw; height: 100vh; }
        /* 頂部 HUD */
        nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); 
            color: white; padding: 10px 20px; display: flex; justify-content: space-between; 
            z-index: 100; box-sizing: border-box; 
        }
        /* 錯誤顯示器 (偵錯用) */
        #debug-log { position: fixed; top: 50px; left: 20px; color: red; background: rgba(0,0,0,0.8); font-size: 12px; z-index: 1000; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 載入中...</div>
    <div style="color: gold;">控制：A, D 移動 / Space 跳躍 / T 聊天</div>
</nav>

<div id="debug-log"></div>
<canvas id="game"></canvas>

<script>
    // 錯誤攔截器：如果程式碼有錯，直接顯示在畫面上
    window.onerror = function(msg) {
        document.getElementById('debug-log').innerText = "系統錯誤: " + msg;
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // 確保視窗大小正確
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 取得玩家資訊
    const user = localStorage.getItem('mc_user') || "冒險者";
    document.getElementById('p-info').innerText = "👤 遠征隊員: " + user;

    // 遊戲物件
    let player = {
        x: 100,
        y: 100,
        w: 30,
        h: 45,
        vy: 0,
        speed: 5,
        jump: -12
    };

    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    // 核心循環
    function update() {
        // 1. 物理計算
        if (keys['KeyD']) player.x += player.speed;
        if (keys['KeyA']) player.x -= player.speed;

        player.vy += 0.8; // 重力
        player.y += player.vy;

        // 2. 簡易地板 (絕對不會掉下去)
        let groundY = canvas.height - 100;
        if (player.y + player.h > groundY) {
            player.y = groundY - player.h;
            player.vy = 0;
            if (keys['Space']) player.vy = player.jump;
        }

        // 3. 渲染畫面
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        // 清除畫面
        ctx.fillStyle = "#1e90ff"; // 天藍色
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫地板
        ctx.fillStyle = "#2ecc71"; // 草地綠
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        // 畫玩家
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        
        // 畫玩家名字
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText(user, player.x + player.w/2, player.y - 10);
    }

    // 啟動遊戲
    console.log("遊戲啟動中...");
    update();

</script>
</body>
</html>
