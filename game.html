<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - AI 覺醒版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #87CEEB; image-rendering: pixelated; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; border-bottom: 2px solid #ffca28; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.9); padding: 8px; border: 2px solid #fff; border-radius: 8px; }
        .slot { width: 45px; height: 45px; border: 1px solid #444; display: flex; justify-content: center; align-items: center; color: white; font-size: 20px; }
        .slot.active { border: 2px solid #ffca28; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<nav>
    <div>👤 房主: <span id="p-name">載入中</span> | 🤖 AI 隊員: <span id="bot-count">0</span></div>
    <div>💖 生命: <span id="hp">20</span> | 🟡 SUPER: <span id="pts">0</span></div>
    <div style="font-size: 12px;">電腦正在自由活動...</div>
</nav>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    const params = new URLSearchParams(window.location.search);
    const botNum = Math.min(parseInt(params.get('players')) || 2, 50);

    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false, hp: 20 };
    let world = {}, entities = [], keys = {}, gameTime = 0;
    let camera = { x: 400, y: 0 };

    document.getElementById('p-name').innerText = localStorage.getItem('mc_user') || "冒險者";
    document.getElementById('bot-count').innerText = botNum - 1;

    // --- 初始化隊友 AI ---
    for(let i=0; i < botNum-1; i++) {
        entities.push({
            x: 420 + i * 40, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false,
            aiState: 'idle', aiTimer: 0, 
            color: `hsl(${Math.random() * 360}, 70%, 60%)` // 每個隊友顏色不同
        });
    }

    // --- 山脈與地層生成 ---
    function gen(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let groundY = Math.floor(15 + Math.sin(x * 0.05) * 8 + Math.sin(x * 0.2) * 2); 
        world[gx] = {};
        for(let y = groundY; y < groundY + 30; y++) {
            world[gx][y * blockSize] = (y === groundY) ? '#2ecc71' : (y < groundY + 4 ? '#8b5a2b' : '#7f8c8d');
        }
    }

    // --- 碰撞與物理 (禁止穿牆) ---
    function check(x, y) {
        return world[Math.floor(x/40)*40] && world[Math.floor(x/40)*40][Math.floor(y/40)*40];
    }

    function applyPhysics(obj) {
        obj.vy += 0.8;
        let nextY = obj.y + obj.vy;
        if (check(obj.x, nextY+36) || check(obj.x+24, nextY+36)) {
            obj.y = Math.floor((nextY+36)/40)*40-36;
            obj.vy = 0; obj.g = true;
        } else { obj.y = nextY; obj.g = false; }

        let nextX = obj.x + (obj.vx || 0);
        // 如果前方有牆，AI 嘗試跳躍
        if (check(nextX, obj.y+20) || check(nextX+24, obj.y+20)) {
            if(obj.g) obj.vy = -12; // 自主避障跳躍
        } else {
            obj.x = nextX;
        }
    }

    // --- AI 自由活動邏輯 ---
    function updateAI(bot) {
        bot.aiTimer--;
        if(bot.aiTimer <= 0) {
            const distToPlayer = player.x - bot.x;
            if(Math.abs(distToPlayer) > 300) { // 太遠了，進入跟隨模式
                bot.aiState = distToPlayer > 0 ? 'right' : 'left';
                bot.aiTimer = 60 + Math.random() * 60;
            } else { // 自由漫步模式
                const rand = Math.random();
                if(rand < 0.4) bot.aiState = 'idle';
                else if(rand < 0.7) bot.aiState = 'left';
                else bot.aiState = 'right';
                bot.aiTimer = 30 + Math.random() * 90;
            }
        }

        if(bot.aiState === 'left') bot.vx = -3;
        else if(bot.aiState === 'right') bot.vx = 3;
        else bot.vx = 0;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        gameTime++;
        player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
        if((keys['Space'] || keys['KeyW']) && player.g) player.vy = -14;
        
        applyPhysics(player);
        entities.forEach(bot => {
            updateAI(bot);
            applyPhysics(bot);
        });

        for(let i=player.x-1000; i<player.x+1000; i+=blockSize) gen(Math.floor(i/blockSize)*blockSize);

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-(camera.x - canvas.width/2), -(camera.y - canvas.height/2));
        
        // 畫世界
        for(let x in world) for(let y in world[x]) {
            ctx.fillStyle = world[x][y];
            ctx.fillRect(x, parseInt(y), 39, 39);
        }
        
        // 畫 AI 隊友 (會動的漂亮像素小人)
        entities.forEach(bot => {
            ctx.fillStyle = bot.color;
            ctx.fillRect(bot.x, bot.y, 24, 36);
            ctx.fillStyle = "black"; ctx.fillRect(bot.x+4, bot.y+6, 4, 4); ctx.fillRect(bot.x+16, bot.y+6, 4, 4); // 眼睛
        });

        // 畫玩家
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, 24, 36);
        ctx.restore();

        document.getElementById('pts').innerText = gameTime;
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
