<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界：地圖與選單進化版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        /* 介面層 */
        nav { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; box-sizing: border-box; }
        
        /* 小地圖樣式 */
        #minimap { position: fixed; top: 60px; right: 20px; width: 150px; height: 100px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 8px; z-index: 20; }

        /* ESC 暫停選單 */
        #pause-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .menu-card { background: #1c2128; padding: 40px; border-radius: 20px; border: 1px solid #444; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .menu-btn { width: 250px; padding: 15px; margin: 10px; background: #238636; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .menu-btn.alt { background: #30363d; border: 1px solid #444; }
        .menu-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        canvas { display: block; background: #1e90ff; cursor: crosshair; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 載入中...</div>
    <div style="font-size: 14px; color: #ff4757;">擊殺數: <span id="kill-count">0</span></div>
    <div style="font-size: 12px; color: #aaa;">按 ESC 暫停/選單</div>
</nav>

<canvas id="minimap"></canvas>

<div id="pause-overlay">
    <div class="menu-card">
        <h1 style="color: #58a6ff; margin-top: 0;">遊戲暫停</h1>
        <p id="menu-stats">冒險者，準備好繼續了嗎？</p>
        <button class="menu-btn" onclick="togglePause()">繼續遠征 (Resume)</button>
        <button class="menu-btn alt" onclick="window.location.href='buy.html'">方案商店 (Shop)</button>
        <button class="menu-btn alt" onclick="window.location.href='index.html'">登出並回首頁 (Logout)</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const user = localStorage.getItem('mc_user') || "冒險者";
    const rank = localStorage.getItem('rank') || "基礎方案";
    document.getElementById('p-info').innerText = `🌍 ${user} 的冒險世界`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const mCanvas = document.getElementById('minimap');
    const mCtx = mCanvas.getContext('2d');

    let isPaused = false;
    function resize() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    window.onresize = resize; resize();

    const blockSize = 40;
    let world = {}, particles = [], enemies = [], keys = {};
    let camera = { x: 0, y: 0 };
    let player = { x: 400, y: -200, w: 26, h: 36, vx: 0, vy: 0, g: false, hp: 100, kills: 0 };

    // --- 暫停功能 ---
    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
        if(isPaused) {
            document.getElementById('menu-stats').innerText = `目前戰績：${player.kills} 擊殺`;
        }
    }

    window.onkeydown = e => {
        if (e.code === 'Escape') togglePause();
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    // --- 地形生成 ---
    function generateColumn(x) {
        if (isNaN(x) || world[x]) return;
        let groundY = Math.floor(12 + Math.sin(x * 0.01) * 10);
        world[x] = [];
        for(let y = groundY; y < groundY + 25; y++) {
            world[x].push({ y: y * blockSize, type: (y === groundY ? 'grass' : 'dirt') });
        }
    }

    // --- 戰鬥與挖掘 ---
    canvas.onmousedown = e => {
        if (isPaused) return;
        const mx = e.clientX + camera.x;
        const my = e.clientY + camera.y;

        enemies.forEach((en, i) => {
            if (mx > en.x && mx < en.x + en.w && my > en.y && my < en.y + en.h) {
                en.hp -= 15;
                en.vx = (en.x - player.x > 0 ? 8 : -8);
                if (en.hp <= 0) {
                    enemies.splice(i, 1);
                    player.kills++;
                    document.getElementById('kill-count').innerText = player.kills;
                }
            }
        });

        const gx = Math.floor(mx/blockSize)*blockSize;
        const gy = Math.floor(my/blockSize)*blockSize;
        if(e.button === 0 && world[gx]) world[gx] = world[gx].filter(b => b.y !== gy);
    };

    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        for (let cx of [gx - blockSize, gx, gx + blockSize]) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx + blockSize && tx + player.w > cx && ty < b.y + blockSize && ty + player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    // --- 繪製小地圖 ---
    function drawMinimap() {
        mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
        mCtx.save();
        mCtx.scale(0.1, 0.1); // 縮放 10 倍看世界
        mCtx.translate(-player.x + 750, -player.y + 500);

        // 畫地形
        mCtx.fillStyle = "rgba(46, 213, 115, 0.5)";
        for(let x in world) {
            const ix = parseInt(x);
            if(Math.abs(ix - player.x) < 800) {
                world[x].forEach(b => mCtx.fillRect(ix, b.y, blockSize, blockSize));
            }
        }
        // 畫玩家
        mCtx.fillStyle = "white";
        mCtx.fillRect(player.x - 20, player.y - 20, 100, 100);
        // 畫怪物
        mCtx.fillStyle = "red";
        enemies.forEach(en => mCtx.fillRect(en.x, en.y, 80, 80));

        mCtx.restore();
    }

    function loop() {
        if (!isPaused) {
            // 物理邏輯
            player.vx = (keys['KeyD'] ? 6 : 0) + (keys['KeyA'] ? -6 : 0);
            player.x += player.vx;
            let hX = checkColl(player.x, player.y);
            if(hX) player.x = player.vx > 0 ? hX.x - player.w - 0.1 : hX.x + blockSize + 0.1;

            if((keys['Space'] || keys['KeyW']) && player.g) { player.vy = -13; player.g = false; }
            player.vy += 0.7; player.y += player.vy;
            let hY = checkColl(player.x, player.y);
            if(hY) {
                if(player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
                else { player.y = hY.y + blockSize + 0.1; }
                player.vy = 0;
            } else { player.g = false; }

            // 怪物追蹤
            enemies.forEach(en => {
                en.vx = player.x > en.x ? 2 : -2;
                en.x += en.vx;
                en.vy += 0.5; en.y += en.vy;
                let ehY = checkColl(en.x, en.y, en.w, en.h);
                if(ehY) { en.y = ehY.y - en.h - 0.1; en.vy = 0; }
            });

            // 地圖生成
            for(let x = Math.floor((player.x - 1000)/blockSize)*blockSize; x <= player.x + 1000; x += blockSize) generateColumn(x);

            // 鏡頭
            camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
        }

        // 繪圖
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        for(let x in world) {
            const ix = parseInt(x);
            if (ix > camera.x - 100 && ix < camera.x + canvas.width + 100) {
                world[x].forEach(b => {
                    ctx.fillStyle = '#2ed573';
                    ctx.fillRect(ix, b.y, blockSize-1, blockSize-1);
                });
            }
        }
        enemies.forEach(en => {
            ctx.fillStyle = "#ff4757"; ctx.fillRect(en.x, en.y, 30, 30);
        });
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        drawMinimap();
        requestAnimationFrame(loop);
    }

    // 隨動怪物生成
    setInterval(() => { if(!isPaused && enemies.length < 4) enemies.push({x: player.x + (Math.random()>0.5?500:-500), y: player.y-200, w:30, h:30, hp:30, vx:0, vy:0}); }, 4000);

    loop();
</script>
</body>
</html>
