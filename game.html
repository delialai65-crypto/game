<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 現代戰爭</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; }
        
        /* HUD 資訊 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 12px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; border-bottom: 2px solid #444; }
        .super-val { color: #ffca28; font-weight: bold; }

        /* ESC 軍事商店選單 */
        #esc-menu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
        }
        .shop-container { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #555; width: 500px; text-align: center; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        .item-btn { 
            padding: 15px; background: #333; color: white; border: 1px solid #555; 
            cursor: pointer; border-radius: 6px; display: flex; flex-direction: column; gap: 5px;
        }
        .item-btn:hover { background: #444; border-color: #ffca28; }
        .item-btn span { color: #ffca28; font-size: 12px; }
        
        .close-btn { margin-top: 20px; background: #c0392b; color: white; border: none; padding: 10px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div>👤 <span id="p-name">載入中</span> | ❤️ HP: <span id="hp-val">20</span></div>
    <div>🟡 SUPER 點數: <span id="pts-val" class="super-val">0</span></div>
    <div>按 <b style="color:var(--accent)">ESC</b> 開啟軍事商店</div>
</nav>

<div id="esc-menu">
    <div class="shop-container">
        <h2 style="color:#ffca28; margin:0;">軍事裝備商店</h2>
        <p style="color:#888; font-size:13px;">使用 SUPER 點數進行戰略購買</p>
        
        <div class="shop-grid">
            <button class="item-btn" onclick="buyItem('TNT', 100)">🧨 放置型 TNT <span>(100 點)</span></button>
            <button class="item-btn" onclick="buyItem('導彈', 500)">🚀 精準導彈 <span>(500 點)</span></button>
            <button class="item-btn" onclick="buyItem('戰車', 2000)">🚜 重型戰車 <span>(2000 點)</span></button>
            <button class="item-btn" onclick="buyItem('戰鬥機', 5000)">✈️ 隱形戰鬥機 <span>(5000 點)</span></button>
            <button class="item-btn" onclick="buyItem('核彈', 50000)" style="grid-column: span 2; border-color:#f1c40f;">☢️ 戰略核武器 <span>(50,000 點)</span></button>
        </div>
        
        <button class="close-btn" onclick="toggleEsc()">關閉選單 (繼續遠征)</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: 100, w: 24, h: 36, vx: 0, vy: 0, g: false };
    let world = {}, keys = {}, isEsc = false;
    let superPts = parseInt(localStorage.getItem('super_points')) || 0;

    document.getElementById('p-name').innerText = localStorage.getItem('mc_user') || "冒險者";

    // --- 商店邏輯 ---
    function toggleEsc() {
        isEsc = !isEsc;
        document.getElementById('esc-menu').style.display = isEsc ? 'flex' : 'none';
    }

    function buyItem(name, price) {
        if(superPts >= price) {
            superPts -= price;
            localStorage.setItem('super_points', superPts);
            updateHUD();
            alert(`✅ 購買成功：${name}！裝備已部署。`);
            // 這裡可以觸發對應的武器效果
            if(name === '核彈') triggerNuke();
        } else {
            alert(`❌ 點數不足！還差 ${price - superPts} 點。`);
        }
    }

    function triggerNuke() {
        // 核彈特效：畫面閃白並清空所有方塊
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        world = {}; // 摧毀所有已知地形
        alert("☢️ 核打擊已執行，地圖已重置。");
    }

    function updateHUD() {
        document.getElementById('pts-val').innerText = superPts;
    }

    // --- 基礎地形與物理 ---
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let gy = Math.floor(12 + Math.sin(x * 0.1) * 5); 
        world[gx] = {};
        for(let y = gy; y < gy + 20; y++) world[gx][y * blockSize] = '#2ecc71';
    }

    window.onkeydown = e => { 
        if(e.code === 'Escape') toggleEsc();
        keys[e.code] = true; 
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(!isEsc) {
            player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
            if((keys['Space'] || keys['KeyW']) && player.g) player.vy = -14;
            
            // 簡易物理
            player.vy += 0.8;
            let nextY = player.y + player.vy;
            let gx = Math.floor((player.x + 12) / blockSize) * blockSize;
            let gy = Math.floor((nextY + 36) / blockSize) * blockSize;
            if (world[gx] && world[gx][gy]) { player.y = gy - 36; player.vy = 0; player.g = true; }
            else { player.y = nextY; player.g = false; }
            player.x += player.vx;

            for(let i=player.x-600; i<player.x+600; i+=blockSize) genTerrain(Math.floor(i/blockSize)*blockSize);
            superPts++; // 持續獲得點數
            updateHUD();
        }

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-(player.x - canvas.width/2), -(player.y - canvas.height/2));
        for(let x in world) for(let y in world[x]) {
            ctx.fillStyle = world[x][y];
            ctx.fillRect(x, parseInt(y), blockSize-1, blockSize-1);
        }
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
