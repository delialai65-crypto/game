<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界：多人模式自定義版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        nav { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; box-sizing: border-box; }
        
        /* ESC 暫停與設置選單 */
        #pause-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .menu-card { background: #1c2128; padding: 40px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 350px; }
        .menu-btn { width: 100%; padding: 12px; margin: 10px 0; background: #238636; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        
        /* 人數選擇器樣式 */
        .slider-box { margin: 20px 0; padding: 15px; background: #0d1117; border-radius: 10px; border: 1px solid #333; }
        input[type=range] { width: 100%; cursor: pointer; }
        .mode-label { background: #ff9f43; color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        
        canvas { display: block; background: #1e90ff; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">👤 載入中...</div>
    <div><span id="m-text" class="mode-label">偵測中</span></div>
    <div style="font-size: 14px; color: #ff4757;">目前人數: <span id="p-count">1</span> 人</div>
</nav>

<div id="pause-overlay">
    <div class="menu-card">
        <h2 style="color: #58a6ff;">遊戲選單</h2>
        
        <div id="multiplayer-settings" class="slider-box">
            <label id="slider-label">多人在線人數: 2 人</label>
            <input type="range" id="p-slider" min="2" max="20" value="2" oninput="updatePlayerCount(this.value)">
            <p style="font-size: 11px; color: #8b949e; margin-top: 5px;">(僅限家庭/大師方案調整)</p>
        </div>

        <button class="menu-btn" onclick="togglePause()">繼續遠征</button>
        <button class="menu-btn" style="background:#30363d" onclick="window.location.href='buy.html'">更換方案</button>
        <button class="menu-btn" style="background:#f85149" onclick="window.location.href='index.html'">退出登出</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const user = localStorage.getItem('mc_user') || "冒險者";
    const rank = localStorage.getItem('rank') || "基礎方案";
    const isMulti = (rank === "家庭方案" || rank === "大師方案");

    document.getElementById('p-info').innerText = `🌍 ${user}`;
    document.getElementById('m-text').innerText = isMulti ? "多人模式" : "單人模式";
    document.getElementById('m-text').style.background = isMulti ? "#2ecc71" : "#ff9f43";

    // 如果是單人模式，停用拉桿
    if(!isMulti) {
        document.getElementById('p-slider').disabled = true;
        document.getElementById('slider-label').innerText = "單人模式鎖定中";
    }

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    let isPaused = false;
    const blockSize = 40;
    let world = {}, others = [], keys = {}, camera = { x: 0, y: 0 };
    let player = { x: 400, y: -200, w: 26, h: 36, vx: 0, vy: 0, g: false };

    // 更新人數邏輯
    function updatePlayerCount(val) {
        document.getElementById('slider-label').innerText = `多人在線人數: ${val} 人`;
        document.getElementById('p-count').innerText = val;
        
        // 重新生成隊友實體
        others = [];
        for(let i=0; i < val - 1; i++) {
            others.push({
                x: player.x + (Math.random()-0.5)*1000,
                y: -500,
                name: `玩家 ${Math.floor(Math.random()*999)}`,
                color: `hsl(${Math.random()*360}, 70%, 70%)`
            });
        }
    }

    // 初始化人數
    if(isMulti) updatePlayerCount(2);

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
    }

    window.onkeydown = e => { if(e.code === 'Escape') togglePause(); keys[e.code] = true; };
    window.onkeyup = e => keys[e.code] = false;

    function generateColumn(x) {
        if (isNaN(x) || world[x]) return;
        let groundY = Math.floor(12 + Math.sin(x * 0.01) * 8);
        world[x] = [];
        for(let y = groundY; y < groundY + 20; y++) {
            world[x].push({ y: y * blockSize, type: y===groundY ? 'grass' : 'dirt' });
        }
    }

    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        for (let cx of [gx - blockSize, gx, gx + blockSize]) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx + blockSize && tx + player.w > cx && ty < b.y + blockSize && ty + player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    function loop() {
        if (!isPaused) {
            player.vx = (keys['KeyD'] ? 6 : 0) + (keys['KeyA'] ? -6 : 0);
            player.x += player.vx;
            let hX = checkColl(player.x, player.y);
            if(hX) player.x = player.vx > 0 ? hX.x - player.w - 0.1 : hX.x + blockSize + 0.1;

            if((keys['Space'] || keys['KeyW']) && player.g) { player.vy = -13; player.g = false; }
            player.vy += 0.7; player.y += player.vy;
            let hY = checkColl(player.x, player.y);
            if(hY) {
                if(player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
                else { player.y = hY.y + blockSize + 0.1; }
                player.vy = 0;
            } else { player.g = false; }

            // 讓隊友稍微晃動，模擬在玩
            others.forEach(op => {
                op.x += Math.sin(Date.now()*0.002 + op.x)*1;
            });

            camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
        }

        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        // 地形
        for(let x = Math.floor((player.x - 1000)/blockSize)*blockSize; x <= player.x + 1000; x += blockSize) {
            generateColumn(x);
            if(world[x]) world[x].forEach(b => {
                ctx.fillStyle = '#2ed573';
                ctx.fillRect(parseInt(x), b.y, blockSize-1, blockSize-1);
            });
        }

        // 畫隊友
        others.forEach(op => {
            ctx.fillStyle = op.color;
            ctx.fillRect(op.x, op.y, 24, 34);
            ctx.fillStyle = "white"; ctx.font = "10px Arial";
            ctx.fillText(op.name, op.x - 5, op.y - 10);
        });

        // 畫玩家
        ctx.fillStyle = "white"; ctx.shadowBlur = 15; ctx.shadowColor = "white";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
