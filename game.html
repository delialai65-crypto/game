<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        nav { position: fixed; top:0; width:100%; background:rgba(0,0,0,0.8); color:white; padding:10px; z-index:10; }
        canvas { display: block; background: #87CEEB; }
    </style>
</head>
<body>
<nav id="nav">載入中...</nav>
<canvas id="game"></canvas>
<script>
    const user = localStorage.getItem('mc_user') || "玩家";
    const rank = localStorage.getItem('rank') || "一般";
    document.getElementById('nav').innerText = `玩家: ${user} | 方案: ${rank}`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const blockSize = 40;
    let world = {}, keys = {}, camera = { x: 0, y: 0 };
    let player = { x: 400, y: -400, w: 28, h: 36, vx: 0, vy: 0, g: false };

    function generateColumn(x) {
        if (world[x]) return;
        let groundY = (x < 1500) ? Math.floor(5 + Math.sin(x * 0.01) * 15) : 10;
        world[x] = [];
        for(let y = groundY; y < groundY + 30; y++) {
            world[x].push({ y: y * blockSize, type: y === groundY ? 'grass' : 'dirt' });
        }
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        for (let cx of [gx-blockSize, gx, gx+blockSize]) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx+blockSize && tx+player.w > cx && ty < b.y+blockSize && ty+player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    function loop() {
        player.vx = (keys['KeyD'] ? 5 : 0) + (keys['KeyA'] ? -5 : 0);
        player.x += player.vx;
        let hX = checkColl(player.x, player.y);
        if(hX) player.x = player.vx > 0 ? hX.x - player.w - 0.1 : hX.x + blockSize + 0.1;

        if(keys['Space'] && player.g) { player.vy = -12; player.g = false; }
        player.vy += 0.6; player.y += player.vy;
        let hY = checkColl(player.x, player.y);
        if(hY) {
            if(player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
            else { player.y = hY.y + blockSize + 0.1; }
            player.vy = 0;
        } else { player.g = false; }

        for(let x = Math.floor((player.x-1000)/blockSize)*blockSize; x <= player.x+1000; x+=blockSize) generateColumn(x);

        // 鏡頭鎖定角色中心
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camera.x, -camera.y);
        for(let x in world) {
            if (x > camera.x - 100 && x < camera.x + canvas.width + 100) {
                world[x].forEach(b => {
                    ctx.fillStyle = b.type === 'grass' ? '#5da346' : '#855c33';
                    ctx.fillRect(parseInt(x), b.y, blockSize-1, blockSize-1);
                });
            }
        }
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
