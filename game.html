<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 幽靈模式</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #87CEEB; }
        
        /* 聊天室樣式 */
        #chat-log { 
            position: fixed; bottom: 80px; left: 20px; width: 350px; height: 180px; 
            background: rgba(0, 0, 0, 0.4); color: white; padding: 12px; 
            overflow-y: auto; border-radius: 4px; font-size: 14px; text-shadow: 1px 1px 1px #000;
            display: none; pointer-events: none;
        }
        #chat-input {
            position: fixed; bottom: 40px; left: 20px; width: 350px;
            background: rgba(0,0,0,0.8); color: white; border: 1px solid #555;
            padding: 8px; border-radius: 4px; display: none; outline: none;
        }

        /* 狀態 HUD */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        #mode-tag { color: #ffca28; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div id="p-name">👤 隊員: 載入中...</div>
    <div id="mode-tag">👻 穿牆模式已開啟 (T 鍵聊天)</div>
    <div>X: <span id="cx">0</span>, Y: <span id="cy">0</span></div>
</nav>

<div id="chat-log"></div>
<input type="text" id="chat-input" placeholder="輸入訊息後按 Enter...">

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: 100, w: 24, h: 36 };
    let world = {}, keys = {}, isChatting = false;
    let camera = { x: 0, y: 0 };

    document.getElementById('p-name').innerText = "👤 隊員: " + (localStorage.getItem('mc_user') || "冒險者");

    // --- 核心：無限地形生成 ---
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let h = Math.floor(10 + Math.sin(x * 0.1) * 5);
        world[gx] = {};
        for(let y = h; y < h + 10; y++) {
            world[gx][y * blockSize] = (y === h) ? 'grass' : 'dirt';
        }
    }

    // --- 鍵盤監聽 ---
    window.onkeydown = (e) => {
        if (e.code === 'KeyT' && !isChatting) {
            e.preventDefault();
            openChat();
        } else if (e.code === 'Enter' && isChatting) {
            sendChat();
        } else if (!isChatting) {
            keys[e.code] = true;
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    // --- 聊天室邏輯 ---
    function openChat() {
        isChatting = true;
        keys = {}; // 清空移動按鍵，防止打字時亂跑
        const log = document.getElementById('chat-log');
        const input = document.getElementById('chat-input');
        log.style.display = 'block';
        input.style.display = 'block';
        input.focus();
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        const log = document.getElementById('chat-log');
        if (input.value) {
            log.innerHTML += `<div><span style="color:#2ecc71">${localStorage.getItem('mc_user') || '我'}:</span> ${input.value}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        input.value = "";
        input.style.display = 'none';
        isChatting = false;
    }

    function loop() {
        if (!isChatting) {
            // --- 核心：無限穿牆飛行移動 ---
            const speed = 7;
            if (keys['KeyD']) player.x += speed;
            if (keys['KeyA']) player.x -= speed;
            if (keys['KeyW'] || keys['Space']) player.y -= speed; // 向上穿牆
            if (keys['KeyS']) player.y += speed; // 向下穿牆

            // 地形預加載
            for(let i = player.x - 800; i < player.x + 800; i += blockSize) {
                genTerrain(Math.floor(i / blockSize) * blockSize);
            }
        }

        // 攝影機跟隨
        camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

        // 繪圖
        ctx.fillStyle = "#87CEEB"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 畫地形
        for (let x in world) {
            for (let y in world[x]) {
                ctx.fillStyle = world[x][y] === 'grass' ? '#2ecc71' : '#8b5a2b';
                ctx.fillRect(x, parseInt(y), blockSize - 1, blockSize - 1);
            }
        }

        // 畫玩家
        ctx.fillStyle = "white";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        document.getElementById('cx').innerText = Math.round(player.x);
        document.getElementById('cy').innerText = Math.round(-player.y);

        requestAnimationFrame(loop);
    }

    window.onload = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        loop();
    };
</script>
</body>
</html>
