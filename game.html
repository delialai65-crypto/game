<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界：Minecraft 全部規則</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #87CEEB; }
        
        /* 頂部 HUD */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.5); color: white; padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; font-size: 14px; }
        .hud-bar { display: flex; gap: 10px; }
        
        /* 底部物品欄 (Hotbar) */
        .hotbar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 4px; z-index: 100; }
        .slot { width: 36px; height: 36px; border: 2px solid #555; background: #8b8b8b; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .slot.active { border-color: #fff; box-shadow: 0 0 8px #fff; }

        /* 聊天室：左下角 */
        #chat { position: fixed; bottom: 70px; left: 20px; width: 350px; background: rgba(0,0,0,0.4); color: white; padding: 10px; border-radius: 4px; font-size: 14px; max-height: 120px; overflow-y: auto; display: none; text-shadow: 1px 1px 1px #000; }
        #chat-input { position: fixed; bottom: 40px; left: 20px; width: 350px; padding: 8px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #555; display: none; outline: none; }
        
        /* ESC 選單：畫面中央 */
        #esc-menu { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .esc-btn { width: 300px; padding: 15px; margin: 10px; background: #4e4e4e; color: white; border: 2px solid #fff; cursor: pointer; font-weight: bold; text-align: center; }
        .esc-btn:hover { background: #6e6e6e; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 載入中...</div>
    <div class="hud-bar">
        ❤️ HP: <span id="hp">20</span> | 🍗 Hunger: <span id="hg">20</span> | 🟡SUPER: <span id="pts">0</span>
    </div>
    <div id="coords" style="color:#2ecc71">X:0, Y:0</div>
</nav>

<div class="hotbar">
    <div class="slot active" data-type="grass">🌱</div>
    <div class="slot" data-type="dirt">🟫</div>
    <div class="slot" data-type="stone">🧱</div>
    <div class="slot" data-type="wood">🪵</div>
    <div class="slot" data-type="sword">⚔️</div>
</div>

<div id="chat"></div>
<input type="text" id="chat-input" placeholder="按 Enter 發送訊息...">

<div id="esc-menu">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" width="300" style="margin-bottom:20px;">
    <div class="esc-btn" onclick="toggleEsc()">回到遊戲</div>
    <div class="esc-btn" onclick="location.href='learning.html'">學習如何遊玩</div>
    <div class="esc-btn" style="background:#da3633" onclick="location.href='main-menu.html'">儲存並離開</div>
</div>

<canvas id="game"></canvas>

<script>
    // --- 核心初始化 ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false, hp: 20, hunger: 20, maxHp: 20, jump: -13 };
    let world = {}, entities = [], keys = {}, selectedBlock = 'grass';
    let camera = { x: 0, y: 0 }, pts = 0, isEsc = false, isT = false;

    // 取得模式與人數
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'single';
    const multiCount = parseInt(params.get('players')) || 1;

    // 顯示玩家名字與點數
    document.getElementById('p-info').innerText = "👤 隊員: " + (localStorage.getItem('mc_user') || "冒險者");
    pts = parseInt(localStorage.getItem('super_points')) || 0;

    // --- 規則一：無限地形生成 (山脈、生物群系) ---
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        // 使用 Sine 波模擬起伏山脈
        let h = Math.floor(10 + Math.sin(x * 0.1) * 6 + Math.cos(x * 0.05) * 4);
        world[gx] = {};
        for(let y = h; y < h + 15; y++) {
            let ty = y * blockSize;
            if(y === h) world[gx][ty] = 'grass';
            else if(y < h + 4) world[gx][ty] = 'dirt';
            else world[gx][ty] = 'stone';
        }
        // 隨機長樹
        if(Math.random() < 0.05) createTree(gx, h);
    }
    function createTree(gx, gy) { for(let i=1;i<=3;i++)world[gx][(gy-i)*blockSize]='log'; world[gx][(gy-4)*blockSize]='leaves'; }

    // --- 規則二：實體生成 (多人隊友、村民、殭屍) ---
    function spawnEntities() {
        if(mode === 'multi') { // 生成隊友
            for(let i=0; i<multiCount-1; i++) entities.push({ x:400+i*20, y:-200, w:24, h:36, vx:0, vy:0, name:"玩家_"+(i+1), type:'player' });
        }
        // 隨機村民與殭屍 (殭屍會追殺村民)
        entities.push({ x: 2000, y: -200, w: 24, h: 36, vx: 0, vy: 0, type: 'villager' });
        entities.push({ x: 2200, y: -200, w: 24, h: 36, vx: 1, vy: 0, type: 'zombie' });
    }
    spawnEntities();

    // --- 操控與物理引擎 (穿牆、跳躍) ---
    window.onkeydown = e => {
        if(e.code === 'Escape') toggleEsc();
        if(e.code === 'KeyT' && !isEsc && !isT) toggleChat(true);
        if(e.code === 'Enter' && isT) sendMsg();
        if(!isT && e.key >= '1' && e.key <= '5') switchHotbar(e.key);
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    // 核心物理與碰撞 (不阻擋，但偵測 Y 軸高度以進行跳躍)
    function applyPhysics(obj) {
        obj.vy += 0.7; // 重力
        obj.x += obj.vx; obj.y += obj.vy;

        let gx = Math.floor(obj.x / blockSize) * blockSize;
        let gy = Math.floor((obj.y + obj.h) / blockSize) * blockSize;
        
        if(world[gx] && world[gx][gy]) { // 地板判定
            obj.g = true;
            if(obj === player && obj.vy > 18) takeDamage(Math.floor(obj.vy - 15), "掉落");
        } else { obj.g = false; }
    }

    // --- 規則三：生存系統 (生命、飢餓、傷害) ---
    let survivalTimer = 0;
    function takeDamage(amt, type) {
        player.hp -= amt;
        addChat("系統", `💥 受到了${type}傷害！`, "red");
        if(player.hp <= 0) { addChat("系統", "👻 遠征隊員重生了！", "red"); player.hp=20; player.x=400; player.y=-200; }
    }

    function updateSurvival() {
        survivalTimer++;
        if(survivalTimer % 1000 === 0 && player.hunger > 0) player.hunger--; // 隨時間扣飢餓
        if(player.hunger >= 18 && player.hp < player.maxHp && survivalTimer % 200 === 0) player.hp++; // 飢餓滿時回血
        if(player.hunger <= 0 && survivalTimer % 100 === 0) takeDamage(1, "飢餓");
    }

    // --- 規則四：建築與挖掘 (滑鼠互動) ---
    canvas.onmousedown = e => {
        if(isEsc || isT) return;
        const mx = Math.floor((e.clientX + camera.x) / blockSize) * blockSize;
        const my = Math.floor((e.clientY + camera.y) / blockSize) * blockSize;
        if(e.button === 0) { // 左鍵：挖掘
            if(world[mx]) delete world[mx][my];
        } else if(e.button === 2) { // 右鍵：建築
            if(!world[mx]) world[mx] = {};
            world[mx][my] = selectedBlock;
        }
    };
    canvas.oncontextmenu = e => e.preventDefault(); // 停用右鍵選單

    // --- 選單、聊天與物品欄邏輯 ---
    function toggleEsc() { isEsc=!isEsc; document.getElementById('esc-menu').style.display=isEsc?'flex':'none'; }
    function toggleChat(o) { isT=o; document.getElementById('chat').style.display=o?'block':'none'; document.getElementById('chat-input').style.display=o?'block':'none'; if(o)document.getElementById('chat-input').focus(); }
    function sendMsg() { let v=document.getElementById('chat-input').value; if(v)addChat(localStorage.getItem('mc_user'),v); document.getElementById('chat-input').value=""; toggleChat(false); }
    function addChat(w,t,c="#fff"){ let l=document.getElementById('chat'); l.style.display="block"; l.innerHTML+=`<div><span style="color:${c}">&lt;${w}&gt;</span> ${t}</div>`; l.scrollTop=l.scrollHeight; }
    function switchHotbar(k) { const slots=document.querySelectorAll('.slot'); slots.forEach(s=>s.classList.remove('active')); slots[k-1].classList.add('active'); selectedBlock=slots[k-1].dataset.type; }

    // --- 遊戲循環 (渲染與更新) ---
    function loop() {
        if(!isEsc) {
            // 每秒加點數
            if(survivalTimer % 60 === 0) { pts++; localStorage.setItem('super_points', pts); }
            
            // 玩家移動
            player.vx = (keys['KeyD']? 6:0) + (keys['KeyA']? -6:0);
            if((keys['Space'] || keys['KeyW']) && player.g) player.vy = player.jump;
            if(keys['KeyW']) player.y -= 8; if(keys['KeyS']) player.y += 8; // 穿牆飛行
            applyPhysics(player);
            
            updateSurvival();
            entities.forEach(applyPhysics); // 實體物理

            // 動態區域載入 (無限地形)
            for(let i=player.x-1000; i<player.x+1000; i+=blockSize) genTerrain(Math.floor(i/blockSize)*blockSize);
        }

        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // 繪圖
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height); // 天空
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        // 畫地形
        for(let x in world) {
            for(let y in world[x]) {
                const t=world[x][y];
                if(t==='grass')ctx.fillStyle='#2ecc71'; else if(t==='dirt')ctx.fillStyle='#8b5a2b';
                else if(t==='stone')ctx.fillStyle='#7f8c8d'; else if(t==='log')ctx.fillStyle='#6d4c41';
                else if(t==='leaves')ctx.fillStyle='#27ae60';
                ctx.fillRect(x, parseInt(y), blockSize-1, blockSize-1);
            }
        }
