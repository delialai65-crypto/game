<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>Delta Cube: Battlezone</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* 1. 身份驗證層 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 5000; background: #0f2027; }
        .auth-box { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 1px solid #4facfe; width: 320px; text-align: center; color: white; }
        
        /* 2. 方案購買頁面 */
        .pricing-box { display: none; flex-direction: row; gap: 20px; color: white; z-index: 6000; }
        .card { background: #1a1a1a; padding: 20px; border: 1px solid #4facfe; border-radius: 10px; width: 200px; text-align: center; }
        .card.master { border-color: #ffca28; box-shadow: 0 0 15px rgba(255,202,40,0.3); }

        /* 3. 遊戲 UI */
        #game-ui { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 100; color: #4facfe; }
        nav { background: rgba(0,0,0,0.5); padding: 10px 20px; display: flex; justify-content: space-between; }

        input { width: 90%; padding: 10px; margin: 10px 0; background: #111; color: #fff; border: 1px solid #333; }
        .btn { width: 100%; padding: 10px; cursor: pointer; border: none; font-weight: bold; margin-top: 10px; border-radius: 5px; }
        .btn-primary { background: #4facfe; color: #fff; }
        .btn-gold { background: #ffca28; color: #000; }
    </style>
</head>
<body>

<!-- 步驟 A: 註冊登入 -->
<div id="auth-page" class="overlay">
    <div class="auth-box">
        <h2 style="color:#4facfe">DELTA CUBE</h2>
        <input type="text" id="user" placeholder="帳號">
        <input type="password" id="pass" placeholder="密碼">
        <button class="btn btn-primary" onclick="showActivation()">登入 / 註冊</button>
    </div>
</div>

<!-- 步驟 B: 啟動碼與方案 -->
<div id="activation-page" class="overlay" style="display:none">
    <div class="auth-box">
        <h3>啟動系統</h3>
        <input type="text" id="activation-key" placeholder="輸入啟動碼">
        <button class="btn btn-primary" onclick="verifyKey()">驗證啟動碼</button>
        <p style="font-size:12px; color:#777; margin-top:20px;">不知道啟動碼？</p>
        <button class="btn btn-gold" onclick="showPricing()">查看訂閱方案</button>
    </div>
</div>

<!-- 步驟 C: 方案詳情 -->
<div id="pricing-page" class="overlay" style="display:none">
    <div class="pricing-box" style="display:flex">
        <div class="card">
            <h4>一般方案</h4>
            <p>$199/月</p>
            <button class="btn btn-primary" onclick="buy('STD')">購買</button>
        </div>
        <div class="card master">
            <h4 style="color:#ffca28">大師方案</h4>
            <p>$499/月</p>
            <button class="btn btn-gold" onclick="buy('MST')">購買</button>
        </div>
    </div>
</div>

<!-- 遊戲內容 UI -->
<div id="game-ui">
    <nav>
        <div>PLAN: <span id="current-plan">None</span></div>
        <div>AMMO: <span id="ammo">30</span></div>
    </nav>
    <div style="position:absolute; top:50%; left:50%; width:10px; height:10px; background:red; border-radius:50%"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, clock, gameActive = false;
    let player = { plan: 'none', ammo: 30 };
    let entities = [], chunks = new Map();

    // --- UI 邏輯 ---
    function showActivation() {
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('activation-page').style.display = 'flex';
    }

    function showPricing() {
        document.getElementById('activation-page').style.display = 'none';
        document.getElementById('pricing-page').style.display = 'flex';
    }

    function buy(type) {
        let code = type === 'STD' ? "STD-123" : "MST-999";
        alert("購買成功！您的啟動碼是: " + code);
        document.getElementById('pricing-page').style.display = 'none';
        document.getElementById('activation-page').style.display = 'flex';
    }

    function verifyKey() {
        const key = document.getElementById('activation-key').value;
        if(key === "STD-123") {
            player.plan = '一般';
            startEngine();
        } else if(key === "MST-999") {
            player.plan = '大師';
            startEngine();
        } else {
            alert("無效的代碼！");
        }
    }

    function startEngine() {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('current-plan').innerText = player.plan;
        
        initGame(); // 啟動 3D
        gameActive = true;
        animate();
    }

    // --- 3D 遊戲引擎 ---
    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        clock = new THREE.Clock();

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 鎖定滑鼠
        renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();
    }

    function animate() {
        if(!gameActive) return;
        requestAnimationFrame(animate);
        let dt = clock.getDelta();

        // 簡單的地圖延伸
        const px = Math.floor(camera.position.x / 10);
        const pz = Math.floor(camera.position.z / 10);
        const key = `${px},${pz}`;
        if(!chunks.has(key)) {
            const h = (player.plan === '大師') ? Math.random()*5 : 0; // 大師方案才有地形起伏
            const geo = new THREE.BoxGeometry(10, 1, 10);
            const mat = new THREE.MeshPhongMaterial({color: player.plan === '大師' ? 0xffca28 : 0x95a5a6});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(px*10, 10 + h, pz*10);
            scene.add(mesh);
            chunks.set(key, mesh);
        }

        // 大師方案專屬：隨機建築
        if(player.plan === '大師' && Math.random() < 0.01) {
            const bld = new THREE.Mesh(new THREE.BoxGeometry(2, 10, 2), new THREE.MeshPhongMaterial({color: 0x333333}));
            bld.position.set(camera.position.x + 20, 15, camera.position.z + 20);
            scene.add(bld);
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
