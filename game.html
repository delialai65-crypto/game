<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #chat-ui { position: fixed; bottom: 50px; left: 20px; display: none; z-index: 100; }
        #chat-log { width: 350px; height: 150px; background: rgba(0,0,0,0.5); color: white; padding: 10px; overflow-y: auto; border-radius: 5px; margin-bottom: 5px; }
        #chat-input { width: 350px; padding: 10px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #555; outline: none; }
        canvas { display: block; background: #1e90ff; }
    </style>
</head>
<body>
    <div id="chat-ui">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="說點什麼... (Enter 發送)">
    </div>
    <canvas id="game"></canvas>

<script>
    const user = localStorage.getItem('mc_user') || "冒險者";
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let isChatting = false;
    const aiWords = ["這座山好高！", "有人看到鑽石嗎？", "按 ESC 可以開商店喔", "你好啊 " + user, "小心後面的殭屍！"];

    window.onkeydown = e => {
        if (e.key.toLowerCase() === 't' && !isChatting) {
            e.preventDefault();
            isChatting = true;
            document.getElementById('chat-ui').style.display = 'block';
            document.getElementById('chat-input').focus();
        } else if (e.key === 'Enter' && isChatting) {
            const msg = document.getElementById('chat-input').value;
            if(msg) {
                addMsg(user, msg);
                // 多人模式模擬 AI
                setTimeout(() => {
                    const reply = aiWords[Math.floor(Math.random()*aiWords.length)];
                    addMsg("電腦隊友", reply, "#58a6ff");
                }, 1000);
            }
            document.getElementById('chat-input').value = "";
            isChatting = false;
            document.getElementById('chat-ui').style.display = 'none';
        }
    };

    function addMsg(who, txt, color="#fff") {
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div><span style="color:${color}">${who}:</span> ${txt}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // 遊戲循環 (保持穩定不消失)
    let player = { x: 400, y: 300, w: 24, h: 34 };
    function loop() {
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#2ed573"; ctx.fillRect(0, 400, canvas.width, 100); // 簡易地面
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
