<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Minefort Luxury | Ultimate Infinite World</title>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: white; font-family: 'Segoe UI', sans-serif; }
        .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; transition: 0.3s; }
        .box { background: white; padding: 40px; border: 2px solid #228B22; border-radius: 20px; text-align: center; width: 400px; box-shadow: 0 0 30px rgba(0,128,0,0.1); }
        .btn { background: #228B22; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; width: 100%; font-weight: bold; }
        input { padding: 12px; margin: 8px 0; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
        canvas { display: block; background: #87CEEB; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <!-- 1. 登入與註冊 -->
    <div id="auth" class="screen">
        <div class="box">
            <h1 style="color:#228B22">MINEFORT</h1>
            <input type="email" id="email" placeholder="輸入電子郵件即可開通帳號">
            <button class="btn" onclick="sendOTP()">確定</button>
        </div>
    </div>

    <!-- 2. 驗證頁 -->
    <div id="verify" class="screen" style="opacity:0; pointer-events:none;">
        <div class="box">
            <div id="msg" style="text-align:left; margin-bottom:20px;"></div>
            <input type="text" id="otp" placeholder="輸入4位驗證碼">
            <button class="btn" onclick="checkOTP()">驗證進入</button>
        </div>
    </div>

    <!-- 3. 大廳 -->
    <div id="lobby" class="screen" style="opacity:0; pointer-events:none;">
        <div class="box">
            <h1>大廳</h1>
            <button class="btn" onclick="gameMode('single')">單人遊戲</button>
            <button class="btn" onclick="gameMode('multi')">多人遊戲</button>
            <div id="multi-set" style="display:none; text-align:left;">
                人數: <input type="number" id="pCount" value="2" min="2" max="10">
                <input type="text" id="sName" placeholder="伺服器名">
                <input type="text" id="sIp" placeholder="伺服器 IP">
            </div>
            <button class="btn" onclick="startWorld()">建立世界</button>
        </div>
    </div>

    <!-- 4. 遊戲 -->
    <div id="game-screen" class="screen" style="display:none;">
        <canvas id="canvas"></canvas>
        <div id="overlay">
            <div class="box">
                <h2>暫停</h2>
                <button class="btn" onclick="togglePause()">繼續遊戲</button>
                <button class="btn" onclick="location.reload()">離開遊戲</button>
            </div>
        </div>
    </div>

    <script>
        let otp = "", scrollX = 0, player = { x: 400, y: 100, vx: 0, vy: 0 }, entities = [], keys = {};
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function sendOTP() {
            if(!document.getElementById('email').value) return alert("請輸入郵件");
            otp = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('msg').innerHTML = `親愛的客戶，歡迎加入 minefort 會員。<br>官方驗證碼：<strong>${otp}</strong><br>此代碼於 15 分鐘後失效。`;
            document.getElementById('auth').style.opacity = 0;
            document.getElementById('verify').style.opacity = 1;
            document.getElementById('verify').style.pointerEvents = 'auto';
        }

        function checkOTP() {
            if(document.getElementById('otp').value === otp) {
                document.getElementById('verify').style.opacity = 0;
                document.getElementById('lobby').style.opacity = 1;
                document.getElementById('lobby').style.pointerEvents = 'auto';
            } else alert("驗證碼錯誤");
        }

        function gameMode(m) { document.getElementById('multi-set').style.display = (m==='multi') ? 'block' : 'none'; }

        function startWorld() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<40; i++) entities.push({x: Math.random()*5000, type: i%5===0 ? 'villager' : 'monster', speed: Math.random()*2});
            animate();
        }

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function togglePause() { document.getElementById('overlay').style.display = (document.getElementById('overlay').style.display === 'flex') ? 'none' : 'flex'; }

        function animate() {
            if(keys['d']) player.vx = 8; else if(keys['a']) player.vx = -8; else player.vx = 0;
            if(keys[' '] && player.vy === 0) player.vy = -20;
            if(keys['escape']) document.getElementById('overlay').style.display = 'flex';
            
            player.vy += 1.2; player.x += player.vx; player.y += player.vy;
            if(player.y > canvas.height - 110) { player.y = canvas.height - 110; player.vy = 0; }
            if(player.x < 0) player.x = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let cameraX = -player.x + canvas.width / 2;

            // 生成 3000 米主山脈與周圍丘陵
            ctx.fillStyle = "#556B2F";
            for(let i=-100; i<100; i++) {
                let dist = Math.abs(player.x - (i*100));
                let h = (dist < 400) ? 900 : 200 + Math.abs(Math.sin(i*0.2)*150);
                ctx.fillRect(i*100 + cameraX, canvas.height - h - 60, 100, h);
            }
            
            // 繪製村莊與怪物
            entities.forEach(e => {
                e.x += Math.sin(Date.now() / 1000) * e.speed;
                ctx.fillStyle = e.type === 'villager' ? '#f1c40f' : '#e74c3c';
                ctx.fillRect(e.x + cameraX, canvas.height - 110, 50, 50);
            });

            ctx.fillStyle = "#228B22"; ctx.fillRect(-5000 + cameraX, canvas.height-60, 15000, 60);
            ctx.fillStyle = "#FFD700"; ctx.fillRect(canvas.width/2-25, player.y, 50, 50);
            
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
