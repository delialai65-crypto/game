<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 完整版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; cursor: crosshair; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border: 2px solid #fff; }
        .slot { width: 45px; height: 45px; border: 1px solid #555; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
        .slot.active { border: 2px solid #ffff00; background: rgba(255,255,255,0.2); }
        #death-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(139,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 2000; }
        #esc-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .btn { width: 280px; padding: 15px; margin: 10px; background: #4e4e4e; color: white; border: 2px solid #fff; cursor: pointer; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div>👤 <span id="p-name">載入中</span> | ❤️ HP: <span id="hp-val">20</span></div>
    <div>🟡 SUPER 點數: <span id="pts-val">0</span></div>
    <div id="coords">X: 0, Y: 0</div>
</nav>

<div id="hotbar">
    <div class="slot active" id="s1" onclick="sel(1)">🌱</div>
    <div class="slot" id="s2" onclick="sel(2)">🟫</div>
    <div class="slot" id="s3" onclick="sel(3)">🧱</div>
    <div class="slot" id="s4" onclick="sel(4)">🪵</div>
    <div class="slot" id="s5" onclick="sel(5)">⚔️</div>
</div>

<div id="death-screen">
    <h1 style="font-size:60px;">你死了！</h1>
    <p>本次遠征點數：<span id="final-pts">0</span></p>
    <button class="btn" onclick="location.reload()">重生</button>
    <button class="btn" onclick="location.href='main-menu.html'">回到主選單</button>
</div>

<div id="esc-menu">
    <h1 style="color:white">遠征暫停</h1>
    <div class="btn" onclick="toggleEsc()">回到遊戲</div>
    <div class="btn" onclick="location.href='main-menu.html'">退出遠征</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false, hp: 20, dead: false };
    let world = {}, entities = [], keys = {}, isEsc = false, selected = 'grass';
    let camera = { x: 0, y: 0 }, superPts = parseInt(localStorage.getItem('super_points')) || 0;

    const params = new URLSearchParams(window.location.search);
    const botCount = Math.min(parseInt(params.get('players')) || 2, 50);

    // --- 地圖填滿規則 ---
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let gy = Math.floor(12 + Math.sin(x * 0.1) * 5); 
        world[gx] = {};
        for(let y = gy; y < gy + 20; y++) {
            world[gx][y * blockSize] = (y === gy) ? 'grass' : (y < gy + 4 ? 'dirt' : 'stone');
        }
        if(Math.random() < 0.03) entities.push({ x:gx, y:(gy-1)*blockSize, vx:0, vy:0, type:'zombie', w:24, h:36 });
    }

    for(let i=0; i<botCount-1; i++) entities.push({ x:400+i*30, y:-200, vx:0, vy:0, type:'mate', w:24, h:36 });

    // --- 嚴格物理規則 (禁止穿牆) ---
    function applyPhysics(obj) {
        if(obj.dead) return;
        obj.vy += 0.8; 
        let nextX = obj.x + obj.vx;
        let nextY = obj.y + obj.vy;

        let gxSide = Math.floor((obj.vx > 0 ? nextX + 24 : nextX) / blockSize) * blockSize;
        let gyMid = Math.floor((obj.y + 18) / blockSize) * blockSize;
        if (!(world[gxSide] && world[gxSide][gyMid])) obj.x = nextX;

        let gx = Math.floor((obj.x + 12) / blockSize) * blockSize;
        let gy = Math.floor((nextY + 36) / blockSize) * blockSize;
        if (world[gx] && world[gx][gy]) { obj.y = gy - 36; obj.vy = 0; obj.g = true; }
        else { obj.y = nextY; obj.g = false; }
    }

    // --- 戰鬥、挖掘、建築 ---
    canvas.onmousedown = e => {
        if(isEsc || player.dead) return;
        let mx = Math.floor((e.clientX + camera.x) / blockSize) * blockSize;
        let my = Math.floor((e.clientY + camera.y) / blockSize) * blockSize;
        if(selected === 'sword') {
            entities = entities.filter(en => Math.hypot(en.x - (e.clientX + camera.x), en.y - (e.clientY + camera.y)) > 60 || en.type === 'mate');
        } else if(e.button === 0) { if(world[mx]) delete world[mx][my]; }
        else { if(!world[mx]) world[mx]={}; world[mx][my]=selected; }
    };

    function toggleEsc() { isEsc=!isEsc; document.getElementById('esc-menu').style.display=isEsc?'flex':'none'; }
    function sel(n) { document.querySelectorAll('.slot').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active'); selected=['grass','dirt','stone','wood','sword'][n-1]; }

    window.onkeydown = e => { if(e.code==='Escape') toggleEsc(); keys[e.code]=true; if(e.key>='1'&&e.key<='5') sel(e.key); };
    window.onkeyup = e => keys[e.code]=false;

    function loop() {
        if(!isEsc && !player.dead) {
            player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
            if((keys['Space'] || keys['KeyW']) && player.g) player.vy = -14;
            applyPhysics(player);

            entities.forEach(en => {
                if(en.type === 'zombie') {
                    en.vx = player.x > en.x ? 2 : -2;
                    if(Math.hypot(en.x - player.x, en.y - player.y) < 30) {
                        player.hp -= 0.1;
                        if(player.hp <= 0) { player.dead=true; document.getElementById('death-screen').style.display='flex'; document.getElementById('final-pts').innerText=superPts; }
                    }
                }
                applyPhysics(en);
            });

            superPts++; localStorage.setItem('super_points', superPts);
            document.getElementById('pts-val').innerText = superPts;
            document.getElementById('hp-val').innerText = Math.ceil(player.hp);
            for(let i=player.x-800; i<player.x+800; i+=blockSize) genTerrain(Math.floor(i/blockSize)*blockSize);
        }
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        for(let x in world) for(let y in world[x]) {
            let t = world[x][y]; ctx.fillStyle = t==='grass'?'#2ecc71':(t==='dirt'?'#8b5a2b':'#7f8c8d');
            ctx.fillRect(x, parseInt(y), blockSize-1, blockSize-1);
        }
        entities.forEach(e => { ctx.fillStyle = e.type==='zombie'?'#2ecc71':'#d35400'; ctx.fillRect(e.x, e.y, e.w, e.h); });
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; loop(); };
</script>
</body>
</html>
