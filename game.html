<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 終極 RPG 規則版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; cursor: crosshair; }
        
        /* 頂部 HUD 升級 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        .stat-bar { display: flex; gap: 15px; font-weight: bold; }
        
        /* 物品欄與耐久度 */
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #555; }
        .slot { width: 50px; height: 50px; border: 1px solid #777; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 20px; position: relative; }
        .slot.active { border: 3px solid #ffff00; background: rgba(255,255,255,0.1); }
        .durability { position: absolute; bottom: 2px; width: 80%; height: 3px; background: #555; }
        .dur-fill { height: 100%; background: #00ff00; }

        /* 死亡與選單 */
        #death-screen, #esc-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #death-screen { background: rgba(100,0,0,0.9); color: white; }
        #esc-menu { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .btn { width: 280px; padding: 15px; margin: 10px; background: #4e4e4e; color: white; border: 2px solid #fff; cursor: pointer; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="stat-bar">
        <span>👤 <span id="p-name">載入中</span></span>
        <span style="color:#ff4d4d">❤️ HP: <span id="hp-val">20</span></span>
        <span style="color:#ffa500">🍗 飢餓: <span id="hg-val">20</span></span>
    </div>
    <div style="color:#ffca28">🟡 SUPER: <span id="pts-val">0</span> | <span id="time-tag">☀️ 白天</span></div>
    <div id="coords">X:0, Y:0</div>
</nav>

<div id="hotbar">
    <div class="slot active" id="s1" onclick="sel(1)">🌱<div class="durability"><div class="dur-fill" style="width:100%"></div></div></div>
    <div class="slot" id="s2" onclick="sel(2)">🧱</div>
    <div class="slot" id="s3" onclick="sel(3)">⚒️</div>
    <div class="slot" id="s4" onclick="sel(4)">⚔️</div>
    <div class="slot" id="s5" onclick="sel(5)">🍎</div>
</div>

<div id="death-screen">
    <h1 style="font-size:60px; text-shadow:4px 4px #000;">遠征終結</h1>
    <p>最終點數：<span id="final-pts">0</span></p>
    <button class="btn" onclick="location.reload()">重新遠征</button>
    <button class="btn" onclick="location.href='main-menu.html'">退出</button>
</div>

<div id="esc-menu">
    <h1 style="color:white">遠征暫停</h1>
    <button class="btn" onclick="toggleEsc()">繼續冒險</button>
    <button class="btn" onclick="location.href='main-menu.html'">存檔並離開</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    // --- 擴展規則：玩家屬性 ---
    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, g: false, hp: 20, hunger: 20, dead: false, swordDur: 100 };
    let world = {}, entities = [], keys = {}, isEsc = false, selected = 'grass', gameTime = 0;
    let camera = { x: 0, y: 0 }, superPts = parseInt(localStorage.getItem('super_points')) || 0;

    const params = new URLSearchParams(window.location.search);
    const botCount = Math.min(parseInt(params.get('players')) || 2, 50);
    document.getElementById('p-name').innerText = localStorage.getItem('mc_user') || "冒險者";

    // --- 規則：地層填滿與丘陵 ---
    function genTerrain(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        let gy = Math.floor(12 + Math.sin(x * 0.1) * 6); 
        world[gx] = {};
        for(let y = gy; y < gy + 35; y++) {
            let type = (y === gy) ? 'grass' : (y < gy + 5 ? 'dirt' : 'stone');
            world[gx][y * blockSize] = type;
        }
        // 隨機生成怪物與村民
        if(Math.random() < 0.04) entities.push({ x:gx, y:(gy-1)*blockSize, vx:0, vy:0, type:'zombie', hp:5, w:24, h:36 });
        if(Math.random() < 0.02) entities.push({ x:gx, y:(gy-1)*blockSize, vx:0, vy:0, type:'villager', w:24, h:36 });
    }

    // --- 規則：嚴格物理 (禁止穿牆) ---
    function applyPhysics(obj) {
        if(obj.dead) return;
        obj.vy += 0.8; 
        let nextX = obj.x + (obj.vx || 0);
        let nextY = obj.y + obj.vy;

        let gxSide = Math.floor((obj.vx > 0 ? nextX + 24 : nextX) / blockSize) * blockSize;
        let gyMid = Math.floor((obj.y + 18) / blockSize) * blockSize;
        if (!(world[gxSide] && world[gxSide][gyMid])) obj.x = nextX;
        else if(obj === player) obj.vx = 0;

        let gx = Math.floor((obj.x + 12) / blockSize) * blockSize;
        let gy = Math.floor((nextY + 36) / blockSize) * blockSize;
        if (world[gx] && world[gx][gy]) { obj.y = gy - 36; obj.vy = 0; obj.g = true; }
        else { obj.y = nextY; obj.g = false; }
    }

    // --- 規則：攻擊與採礦 ---
    canvas.onmousedown = e => {
        if(isEsc || player.dead) return;
        let mx = Math.floor((e.clientX + camera.x) / blockSize) * blockSize;
        let my = Math.floor((e.clientY + camera.y) / blockSize) * blockSize;
        
        if(selected === 'sword') {
            player.swordDur -= 2; // 消耗耐久
            entities.forEach(en => {
                if(en.type === 'zombie' && Math.hypot(en.x - (e.clientX + camera.x), en.y - (e.clientY + camera.y)) < 60) {
                    en.hp -= 2;
                }
            });
            entities = entities.filter(en => en.hp > 0 || en.type !== 'zombie');
        } else if(selected === 'apple') {
            if(player.hunger < 20) { player.hunger = Math.min(20, player.hunger + 5); }
        } else {
            if(e.button === 0 && world[mx]) delete world[mx][my];
            if(e.button === 2) { if(!world[mx]) world[mx]={}; world[mx][my]=selected; }
        }
    };
    canvas.oncontextmenu = e => e.preventDefault();

    function toggleEsc() { isEsc = !isEsc; document.getElementById('esc-menu').style.display = isEsc?'flex':'none'; }
    function sel(n) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        selected = ['grass', 'stone', 'pickaxe', 'sword', 'apple'][n-1];
    }

    window.onkeydown = e => { if(e.code==='Escape') toggleEsc(); if(e.key>='1'&&e.key<='5') sel(e.key); keys[e.code]=true; };
    window.onkeyup = e => keys[e.code]=false;

    function loop() {
        if(!isEsc && !player.dead) {
            gameTime++;
            // 晝夜循環
            let isNight = (gameTime % 2400) > 1200;
            document.getElementById('time-tag').innerText = isNight ? "🌙 夜晚" : "☀️ 白天";

            // 飢餓與生命邏輯
            if(gameTime % 200 === 0 && player.hunger > 0) player.hunger -= 0.5;
            if(player.hunger <= 0 && gameTime % 100 === 0) player.hp -= 1;
            if(player.hunger > 18 && player.hp < 20 && gameTime % 100 === 0) player.hp += 0.5;

            player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
            if((keys['Space'] || keys['KeyW']) && player.g) player.vy = -14;
            applyPhysics(player);
            
            entities.forEach(en => {
                if(en.type === 'zombie') {
                    en.vx = (player.x > en.x ? 2.5 : -2.5) * (isNight ? 1.5 : 1); // 晚上更兇
                    if(Math.hypot(en.x - player.x, en.y - player.y) < 30) player.hp -= 0.1;
                }
                applyPhysics(en);
            });

            if(player.hp <= 0) { player.dead=true; document.getElementById('death-screen').style.display='flex'; document.getElementById('final-pts').innerText=superPts; }

            superPts++; 
            document.getElementById('pts-val').innerText = superPts;
            document.getElementById('hp-val').innerText = Math.ceil(player.hp);
            document.getElementById('hg-val').innerText = Math.floor(player.hunger);
            for(let i=player.x-1000; i<player.x+1000; i+=blockSize) genTerrain(Math.floor(i/blockSize)*blockSize);
        }

        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // 渲染背景
        ctx.fillStyle = (gameTime % 2400) > 1200 ? "#1a1a2e" : "#87CEEB"; 
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        for(let x in world) for(let y in world[x]) {
            let t = world[x][y];
            ctx.fillStyle = t==='grass'?'#2ecc71':(t==='dirt'?'#8b5a2b':'#7f8c8d');
            ctx.fillRect(x, parseInt(y), blockSize-1, blockSize-1);
        }
        entities.forEach(e => {
            ctx.fillStyle = e.type==='zombie'?'#27ae60':(e.type==='villager'?'#f1c40f':'#d35400');
            ctx.fillRect(e.x, e.y, e.w, e.h);
        });
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
        
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
