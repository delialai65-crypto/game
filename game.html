<style>
    /* 聊天顯示區：加上磨砂感與淡出動畫 */
    #chat-log { 
        width: 380px; height: 160px; 
        background: rgba(0, 0, 0, 0.4); 
        color: white; padding: 12px; 
        overflow-y: auto; border-radius: 4px; 
        font-family: 'Segoe UI', sans-serif;
        font-size: 15px; text-shadow: 1px 1px 2px #000;
        display: none; /* 平時隱藏，有訊息或按 T 才顯示 */
    }

    /* 輸入框：完美還原黑框樣式 */
    #chat-input { 
        width: 380px; padding: 10px; 
        background: rgba(0, 0, 0, 0.85); 
        color: #fff; border: 2px solid #555; 
        outline: none; border-radius: 2px;
        display: none; margin-top: 5px;
    }
</style>

<script>
    function addChat(who, txt, color = "#fff") {
        const log = document.getElementById('chat-log');
        log.style.display = "block"; // 顯示對話框
        
        // 建立訊息行
        const line = document.createElement('div');
        line.style.marginBottom = "4px";
        line.innerHTML = `<span style="color:${color}; font-weight:bold;">&lt;${who}&gt;</span> ${txt}`;
        
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;

        // 如果不是在打字狀態，5秒後自動隱藏對話框保持畫面乾淨
        if (!isChatting) {
            setTimeout(() => {
                if (!isChatting) log.style.opacity = "0.7";
            }, 5000);
        }
    }

    window.onkeydown = e => {
        // 按下 T 鍵
        if (e.key.toLowerCase() === 't' && !isChatting) {
            e.preventDefault();
            isChatting = true;
            document.getElementById('chat-log').style.display = "block";
            document.getElementById('chat-log').style.opacity = "1";
            document.getElementById('chat-input').style.display = "block";
            document.getElementById('chat-input').focus();
        } 
        // 按下 Enter 發送
        else if (e.key === 'Enter' && isChatting) {
            const msg = document.getElementById('chat-input').value.trim();
            if (msg) {
                addChat(user, msg); // 顯示你的名字，例如 <賴嫦瑜> 你好
                
                // 多人模式：電腦隨機回話
                if (mode === "multi") {
                    setTimeout(() => {
                        const reactions = ["大家快看，有人說話了！", "你好啊冒險者", "要一起去挖礦嗎？", "這地圖真大"];
                        addChat("電腦隊友", reactions[Math.floor(Math.random()*reactions.length)], "#58a6ff");
                    }, 1000);
                }
            }
            document.getElementById('chat-input').value = "";
            isChatting = false;
            document.getElementById('chat-input').style.display = "none";
        }
    };
</script>
