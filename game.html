<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 3D：F-35 戰略打擊</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        #ui { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        nav { padding: 20px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); color: #0f0; border-bottom: 2px solid #0f0; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid #0f0; transform: translate(-50%, -50%); border-radius: 50%; }
        
        /* B 鍵戰略商城選單 */
        #shop-menu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000; color: #fff; pointer-events: all; 
        }
        .shop-container { border: 2px solid #0f0; padding: 40px; background: #050505; text-align: center; border-radius: 15px; }
        .item-grid { display: flex; gap: 30px; margin-top: 30px; }
        .item { 
            width: 180px; padding: 20px; border: 1px solid #444; cursor: pointer; transition: 0.3s; 
            display: flex; flex-direction: column; align-items: center;
        }
        .item:hover { border-color: #0f0; background: #002200; transform: translateY(-5px); }
        .item img { width: 80px; height: 80px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="ui">
    <nav>
        <div>[ 戰術終端 ] 座標: <span id="coords">0,0</span></div>
        <div>💰 財富淨值: $<span id="balance">0</span> | ❤️ HP: 100</div>
    </nav>
    <div id="crosshair"></div>
</div>

<div id="shop-menu">
    <div class="shop-container">
        <h2 style="color:#0f0">🌐 全球軍事商城 (Global Military Shop)</h2>
        <div class="item-grid">
            <div class="item" onclick="purchase('F35', 50000)">
                <span style="font-size: 50px;">✈️</span>
                <h4>F-35 戰鬥機</h4>
                <p>極速飛行/空中打擊<br>$50,000</p>
            </div>
            <div class="item" onclick="purchase('NUKE', 100000)">
                <img src="image_8cf2ef.jpg" alt="放射性標誌">
                <h4>戰略核彈</h4>
                <p>全地圖敵軍抹除<br>$100,000</p>
            </div>
        </div>
        <button onclick="toggleMenu(false)" style="margin-top:30px; color:#0f0; background:none; border:1px solid #0f0; padding:10px 40px; cursor:pointer;">返回戰場</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, clock;
    let keys = {}, player = { cash: 1000, mode: 'foot', velocity: new THREE.Vector3() };
    let isMenu = false, yaw = 0, pitch = 0;
    let chunks = new Map(), enemies = [];

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 確保始終是白天
        scene.fog = new THREE.Fog(0x87CEEB, 1, 150);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.position.set(0, 15, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        clock = new THREE.Clock();

        // 強光照系統：解決漆黑
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        document.addEventListener('click', () => { if(!isMenu) renderer.domElement.requestPointerLock(); });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement && !isMenu) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            }
        });

        window.addEventListener('keydown', e => {
            if(e.code === 'KeyB') toggleMenu(!isMenu);
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
    }

    function toggleMenu(show) {
        isMenu = show;
        document.getElementById('shop-menu').style.display = show ? 'flex' : 'none';
        if(show) document.exitPointerLock(); else renderer.domElement.requestPointerLock();
    }

    function purchase(type, price) {
        if(player.cash >= price) {
            player.cash -= price;
            if(type === 'F35') {
                player.mode = 'plane';
                camera.position.y = 100; // 升空
                alert("🛩️ F-35 閃電II 已就緒！移動速度大幅提升。");
            } else if(type === 'NUKE') {
                scene.background = new THREE.Color(0xffffff); // 核爆閃白
                setTimeout(() => scene.background = new THREE.Color(0x87CEEB), 300);
                enemies.forEach(e => scene.remove(e));
                enemies = [];
                alert("☢️ 戰略核打擊成功！所有敵軍已抹除。");
            }
        } else {
            alert("資金不足！請繼續在廢墟中探索賺錢。");
        }
        toggleMenu(false);
    }

    function generateChunk(cx, cz) {
        const key = `${cx},${cz}`;
        if (chunks.has(key)) return;
        const group = new THREE.Group();
        const box = new THREE.BoxGeometry(1, 1, 1);
        const mats = { g: new THREE.MeshPhongMaterial({ color: 0x4d5d30 }), s: new THREE.MeshPhongMaterial({ color: 0x444 }) };
        for (let x = 0; x < 16; x++) {
            for (let z = 0; z < 16; z++) {
                const wx = cx*16+x, wz = cz*16+z;
                let h = Math.floor(Math.sin(wx*0.1)*3 + Math.cos(wz*0.1)*3 + 8);
                const b = new THREE.Mesh(box, mats.g);
                b.position.set(wx, h, wz);
                group.add(b);
            }
        }
        scene.add(group);
        chunks.set(key, group);
    }

    function animate() {
        requestAnimationFrame(animate);
        let delta = clock.getDelta();
        
        if(!isMenu && document.pointerLockElement === renderer.domElement) {
            let speed = (player.mode === 'plane') ? 80 : 15; // F-35 極速模式
            let dir = new THREE.Vector3();
            let front = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            if(player.mode === 'foot') front.y = 0;
            let right = new THREE.Vector3().crossVectors(front, new THREE.Vector3(0,1,0)).normalize();
            
            if(keys['KeyW']) dir.add(front);
            if(keys['KeyS']) dir.add(front.negate());
            if(keys['KeyA']) dir.add(right.negate());
            if(keys['KeyD']) dir.add(right);
            
            camera.position.add(dir.normalize().multiplyScalar(speed * delta));
            
            // 物理門檻：防止穿牆陷地
            if(player.mode === 'foot' && camera.position.y < 12.5) camera.position.y = 12.5;
            if(player.mode === 'plane' && camera.position.y < 25) camera.position.y = 25;

            // 大富翁機制：探索獎勵
            if(dir.length() > 0) player.cash += 5; 
        }

        const cx = Math.floor(camera.position.x/16), cz = Math.floor(camera.position.z/16);
        for(let x=-2; x<=2; x++) for(let z=-2; z<=2; z++) generateChunk(cx+x, cz+z);

        document.getElementById('balance').innerText = Math.floor(player.cash);
        document.getElementById('coords').innerText = `${Math.floor(camera.position.x)}, ${Math.floor(camera.position.z)}`;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
