<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>鐵路系統 - 極致順暢版</title>
    <style>
        :root { --main: #2c3e50; --acc: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .train-item { border: 1px solid #ddd; padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .train-item:hover { border-color: var(--acc); background: #fffdf9; }
        .ticket-item { padding: 12px; border-left: 5px solid var(--acc); background: #fff; margin-bottom: 10px; box-shadow: 1px 1px 5px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--main); color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--acc); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">🚄 鐵路訂票系統 (豪華版)</h1>
    <div class="grid-layout">
        <div>
            <div class="card">
                <h3>步驟 1: 查詢</h3>
                <select id="lineSel" onchange="updateStations()"></select>
                <select id="from"></select> <select id="to"></select>
                <button onclick="showTrains()">搜尋車次</button>
            </div>
            <div id="trainPanel" class="card" style="display:none">
                <h3>步驟 2: 選擇</h3>
                <div id="trainList"></div>
            </div>
            <div id="bookingPanel" class="card" style="display:none">
                <h3>步驟 3: 完成</h3>
                <input type="text" id="uid" placeholder="請輸入證號 (選填)">
                <p>總金額: <strong id="totalPrice" style="color:var(--acc)">$0</strong></p>
                <button onclick="confirmOrder()">立即完成訂票</button>
            </div>
        </div>

        <div class="card">
            <h3>我的票庫</h3>
            <input type="text" id="search" placeholder="🔍 搜尋訂單編號..." oninput="renderTickets()">
            <div id="ticketDisplay"></div>
        </div>
    </div>
</div>

<script>
    const db = [
        { line: "縱貫線", stations: ["基隆", "台北", "桃園", "新竹", "台中", "高雄"] },
        { line: "平溪線", stations: ["三貂嶺", "十分", "平溪", "菁桐"] },
        { line: "宜蘭線", stations: ["八堵", "瑞芳", "福隆", "宜蘭"] }
    ];
    const trainData = [
        { name: "普悠瑪號", price: 500, time: "10:30" },
        { name: "新自強號", price: 400, time: "11:15" },
        { name: "區間車", price: 200, time: "12:00" }
    ];

    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
    let temp = {};

    function init() {
        document.getElementById('lineSel').innerHTML = db.map(d => `<option>${d.line}</option>`).join('');
        updateStations(); renderTickets();
    }

    function updateStations() {
        const line = db.find(d => d.line == document.getElementById('lineSel').value);
        document.getElementById('from').innerHTML = document.getElementById('to').innerHTML = line.stations.map(s => `<option>${s}</option>`).join('');
    }

    function showTrains() {
        document.getElementById('trainPanel').style.display = 'block';
        document.getElementById('trainList').innerHTML = trainData.map(t => `
            <div class="train-item" onclick="openBooking('${t.name}', ${t.price}, '${t.time}')">
                <div><strong>${t.name}</strong><br>時間: ${t.time}</div>
                <div>$${t.price}</div>
            </div>`).join('');
    }

    function openBooking(name, price, time) {
        temp = { name, price, time };
        document.getElementById('bookingPanel').style.display = 'block';
        document.getElementById('totalPrice').innerText = '$' + price;
    }

    // 已完全移除所有身分證驗證邏輯，流程暢通無阻
    function confirmOrder() {
        tickets.unshift({ id: 'TKT-'+Date.now(), ...temp });
        localStorage.setItem('tickets', JSON.stringify(tickets));
        renderTickets();
        alert('訂票成功！');
    }

    function renderTickets() {
        const kw = document.getElementById('search').value;
        const display = document.getElementById('ticketDisplay');
        const list = tickets.filter(t => t.id.includes(kw));
        display.innerHTML = list.map(t => `
            <div class="ticket-item">
                <strong>${t.id}</strong><br>${t.name} | ${t.time} | $${t.price}
                <button onclick="del('${t.id}')" style="background:#e74c3c">退票</button>
            </div>`).join('');
    }

    function del(id) {
        tickets = tickets.filter(t => t.id !== id);
        localStorage.setItem('tickets', JSON.stringify(tickets));
        renderTickets();
    }

    init();
</script>
</body>
</html>
