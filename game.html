<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界：完美穩定版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        nav { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.7); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-sizing: border-box; }
        #pause-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .menu-card { background: #1c2128; padding: 30px; border-radius: 20px; border: 1px solid #444; text-align: center; }
        .menu-btn { width: 200px; padding: 12px; margin: 10px; background: #238636; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .slider-box { margin: 15px 0; padding: 10px; background: #0d1117; border-radius: 10px; }
        canvas { display: block; background: #1e90ff; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 載入中...</div>
    <div id="m-status">模式：<span id="m-badge" style="background:#ff9f43; padding:2px 8px; border-radius:4px;">偵測中</span></div>
    <div id="coord" style="font-family: monospace; font-size: 12px;">X: 0, Y: 0</div>
</nav>

<div id="pause-overlay">
    <div class="menu-card">
        <h2>遊戲選單</h2>
        <div class="slider-box" id="multi-ctrl">
            <label id="p-label">多人人數: 2 人</label><br>
            <input type="range" id="p-slider" min="2" max="20" value="2" oninput="updateOthers(this.value)">
        </div>
        <button class="menu-btn" onclick="togglePause()">繼續遊戲</button>
        <button class="menu-btn" style="background:#f85149" onclick="window.location.href='index.html'">登出</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    // --- 安全初始化 ---
    const user = localStorage.getItem('mc_user') || "冒險者";
    const rank = localStorage.getItem('rank') || "基礎方案";
    const isMulti = (rank === "家庭方案" || rank === "大師方案");

    document.getElementById('p-info').innerText = `👤 ${user}`;
    const badge = document.getElementById('m-badge');
    badge.innerText = isMulti ? "多人模式" : "單人模式";
    badge.style.background = isMulti ? "#2ecc71" : "#ff9f43";
    if(!isMulti) document.getElementById('multi-ctrl').style.opacity = "0.5";

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const blockSize = 40;
    let world = {}, others = [], keys = {}, camera = { x: 0, y: 0 }, isPaused = false;
    let player = { x: 400, y: -200, w: 24, h: 34, vx: 0, vy: 0, g: false };

    // --- 隊友生成修正 (防 NaN) ---
    function updateOthers(val) {
        if(!isMulti) return;
        document.getElementById('p-label').innerText = `多人人數: ${val} 人`;
        others = [];
        for(let i=0; i < parseInt(val)-1; i++) {
            others.push({
                x: player.x + (Math.random()-0.5)*800,
                y: -500,
                color: `hsl(${Math.random()*360}, 60%, 70%)`
            });
        }
    }
    if(isMulti) updateOthers(2);

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
    }

    window.onkeydown = e => { if(e.code === 'Escape') togglePause(); keys[e.code] = true; };
    window.onkeyup = e => keys[e.code] = false;

    function generateColumn(x) {
        const ix = Math.floor(x);
        if (isNaN(ix) || world[ix]) return;
        let groundY = Math.floor(12 + Math.sin(ix * 0.01) * 8);
        world[ix] = [];
        for(let y = groundY; y < groundY + 20; y++) {
            world[ix].push({ y: y * blockSize });
        }
    }

    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        for (let cx of [gx - blockSize, gx, gx + blockSize]) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx + blockSize && tx + player.w > cx && ty < b.y + blockSize && ty + player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    function loop() {
        if (!isPaused) {
            // --- 鋼鐵防消失機制 ---
            if(isNaN(player.x) || isNaN(player.y)) {
                player.x = 400; player.y = -200; player.vx = 0; player.vy = 0;
            }

            player.vx = (keys['KeyD'] ? 6 : 0) + (keys['KeyA'] ? -6 : 0);
            player.x += player.vx;
            let hX = checkColl(player.x, player.y);
            if(hX) player.x = player.vx > 0 ? hX.x - player.w - 0.1 : hX.x + blockSize + 0.1;

            if((keys['Space'] || keys['KeyW']) && player.g) { player.vy = -13; player.g = false; }
            player.vy += 0.7; player.y += player.vy;
            let hY = checkColl(player.x, player.y);
            if(hY) {
                if(player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
                else { player.y = hY.y + blockSize + 0.1; }
                player.vy = 0;
            } else { player.g = false; }

            if(player.y > 2000) { player.y = -500; player.vy = 0; }

            // 攝影機鎖定 (加入 NaN 檢查)
            let tx = player.x - canvas.width/2;
            let ty = player.y - canvas.height/2;
            if(!isNaN(tx) && !isNaN(ty)) {
                camera.x += (tx - camera.x) * 0.1;
                camera.y += (ty - camera.y) * 0.1;
            }
        }

        // 渲染
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        // 地形生成與繪製
        let startX = Math.floor((player.x - 1000)/blockSize)*blockSize;
        let endX = startX + 2000;
        for(let x = startX; x <= endX; x += blockSize) {
            generateColumn(x);
            if(world[x]) world[x].forEach(b => {
                ctx.fillStyle = '#2ed573';
                ctx.fillRect(x, b.y, blockSize-1, blockSize-1);
            });
        }

        // 畫其他玩家
        others.forEach(op => {
            ctx.fillStyle = op.color;
            ctx.globalAlpha = 0.6;
            ctx.fillRect(op.x, player.y, 24, 34); // 讓隊友跟著玩家的高度，防止掉落 NaN
            ctx.globalAlpha = 1.0;
        });

        // 畫玩家
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        document.getElementById('coord').innerText = `X: ${Math.round(player.x)}, Y: ${Math.round(-player.y)}`;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
