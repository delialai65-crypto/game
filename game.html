<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界：Minecraft 終極規則</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #87CEEB; } /* 天藍色背景 */
        
        /* 頂部 HUD (生命、飢餓、座標) */
        nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.5); 
            color: white; padding: 10px 20px; display: flex; justify-content: space-between; 
            z-index: 100; box-sizing: border-box; font-size: 14px;
        }
        
        /* 聊天室與村民對話樣式 */
        #chat-log { 
            position: fixed; bottom: 80px; left: 20px; width: 350px; height: 180px; 
            background: rgba(0, 0, 0, 0.4); color: white; padding: 12px; 
            overflow-y: auto; border-radius: 4px; font-size: 14px; text-shadow: 1px 1px 1px #000;
            display: none;
        }
        
        #esc-menu { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 載入中...</div>
    <div style="color: #ff4757;">❤️ HP: <span id="hp">20</span> | 🍗 Hunger: <span id="hg">20</span></div>
    <div id="coord">X:0, Y:0</div>
</nav>

<div id="chat-log"></div>

<div id="esc-menu">
    <h1>遠征選單</h1>
    <button onclick="toggleEsc()" style="padding:15px 40px">返回遠征 (Back)</button>
    <div style="margin-top:20px">🛒 戰備商店：<button onclick="alert('鑽石劍已裝備')">💎 鑽石劍 ($500)</button></div>
    <button onclick="location.href='index.html'" style="margin-top:20px; background:#da3633; color:white;">💾 儲存並退出</button>
</div>

<canvas id="game"></canvas>

<script>
    // 取得玩家資訊
    const user = localStorage.getItem('mc_user') || "冒險者";
    document.getElementById('p-info').innerText = "👤 隊員: " + user;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 遊戲常數與設定
    const blockSize = 40; // 方塊大小
    let isChatting = false, isEsc = false;
    let camera = { x: 0, y: 0 };
    let keys = {};
    let world = {}, villagers = [];

    // --- 核心規則：玩家狀態 ---
    let player = { 
        x: 400, y: -200, w: 24, h: 36, 
        vx: 0, vy: 0, g: false,
        hp: 20, hunger: 20, maxHp: 20, maxHunger: 20,
        jumpPower: -13, speed: 6
    };

    // --- 核心規則：地形生成器 (山與地形) ---
    function getGroundY(x) {
        // 使用多重 Sine 波模擬高低起伏的山丘
        return Math.floor(10 + Math.sin(x * 0.03) * 6 + Math.cos(x * 0.01) * 3);
    }

    function generateChunk(startX) {
        for(let x = startX; x < startX + 1000; x += blockSize) {
            let gx = Math.floor(x / blockSize) * blockSize;
            if(!world[gx]) {
                let gy = getGroundY(gx / blockSize);
                world[gx] = {};
                // 生成草地與泥土 (生存規則：層次地形)
                for(let y = gy; y < gy + 10; y++) {
                    world[gx][y * blockSize] = (y === gy) ? 'grass' : 'dirt';
                }
                // 生存規則：隨機生成村民在村莊點 (例如每 2000 像素一個)
                if(gx % 2000 === 0 && gx !== 0) createVillager(gx, (gy-1)*blockSize);
            }
        }
    }

    // --- 核心規則：村民 AI ---
    function createVillager(x, y) {
        villagers.push({ 
            x: x, y: y, w: 24, h: 36, 
            vx: 0, vy: 0, g: false,
            type: ['農夫', '圖書管理員', '武器匠'][Math.floor(Math.random()*3)],
            moveTimer: 0
        });
    }

    // 村民 AI 邏輯：隨機遊蕩
    function updateVillager(v) {
        v.vy += 0.8; // 重力
        if(v.moveTimer > 0) {
            v.x += v.vx; v.moveTimer--;
        } else {
            // 隨機休息或移動
            if(Math.random() < 0.2) {
                v.vx = (Math.random() < 0.5 ? 1 : -1) * 2;
                v.moveTimer = Math.random() * 100 + 50;
            } else { v.vx = 0; v.moveTimer = 100; }
        }
        
        v.y += v.vy;
        handleCollision(v); // 村民也受物理規則限制
    }

    // --- 核心物理引擎 (碰撞、重力) ---
    function handleCollision(obj) {
        let gx = Math.floor(obj.x / blockSize) * blockSize;
        let gy = Math.floor((obj.y + obj.h) / blockSize) * blockSize;
        
        if(world[gx] && world[gx][gy]) {
            obj.y = gy - obj.h;
            
            // --- 生存規則：掉落傷害 ---
            if(obj === player && obj.vy > 18) {
                obj.hp -= Math.floor(obj.vy - 15);
                addChat("系統", "💥 遠征隊員受到了掉落傷害！", "red");
            }
            obj.vy = 0; obj.g = true;
        } else { obj.g = false; }
    }

    // --- 生存規則：飢餓系統與生命回覆 ---
    let survivalTimer = 0;
    function updateSurvival() {
        survivalTimer++;
        if(survivalTimer % 1000 === 0 && player.hunger > 0) player.hunger--; // 隨時間扣飢餓
        
        if(player.hunger >= 18 && player.hp < player.maxHp && survivalTimer % 200 === 0) {
            player.hp++; // 飢餓滿時回血
        }
        if(player.hunger <= 0 && survivalTimer % 100 === 0) {
            player.hp--; // 飢餓為零時扣血
        }
    }

    // --- 操控邏輯 ---
    window.onkeydown = e => { if(e.code==='Escape')toggleEsc(); keys[e.code]=true; };
    window.onkeyup = e => keys[e.code]=false;
    function toggleEsc(){ isEsc=!isEsc; document.getElementById('esc-menu').style.display=isEsc?'flex':'none'; }

    function addChat(who, txt, color="#fff") {
        const log = document.getElementById('chat-log');
        log.style.display="block"; log.innerHTML+=`<div><span style="color:${color}">&lt;${who}&gt;</span> ${txt}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // --- 遊戲循環 ---
    function loop() {
        if(!isEsc) {
            // 玩家移動
            player.vx = (keys['KeyD']? player.speed:0) + (keys['KeyA']? -player.speed:0);
            player.x += player.vx;
            player.vy += 0.8; player.y += player.vy;
            handleCollision(player);
            if((keys['Space'] || keys['KeyW']) && player.g) player.vy = player.jumpPower;

            updateSurvival();
            generateChunk(player.x - 1000);
            villagers.forEach(updateVillager);
            
            // --- 社交規則：村民對話模擬 ---
            if(Math.random() < 0.01 && villagers.length > 0) {
                const near = villagers[0]; // 簡化：只跟第一個村民對話
                addChat(near.type, near.type === '圖書管理員' ? "📚 哈囉，要交易附魔書嗎？" : "Hmm...", "#ffca28");
            }
        }

        // 攝影機跟隨
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // 渲染畫面
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height); // 天空
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        // 畫地形
        for(let x in world) {
            for(let y in world[x]) {
                let type = world[x][y];
                ctx.fillStyle = type==='grass'?'#2ecc71':(type==='dirt'?'#8b5a2b':'#fff');
                ctx.fillRect(x, y, blockSize-1, blockSize-1);
            }
        }

        // 畫村民 (棕色小人)
        villagers.forEach(v => { ctx.fillStyle = "#d35400"; ctx.fillRect(v.x, v.y, v.w, v.h); });
        
        // 畫玩家 (白色小人)
        ctx.fillStyle = player.hp < 5 ? "red":"white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();

        // 更新 HUD
        document.getElementById('hp').innerText = player.hp;
        document.getElementById('hg').innerText = player.hunger;
        document.getElementById('coord').innerText = `X:${Math.round(player.x)}, Y:${Math.round(-player.y)}`;
        
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
