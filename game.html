<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界：終極穩定版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        nav { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.7); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-sizing: border-box; }
        .stats { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        .bar { width: 150px; height: 10px; background: #444; border: 2px solid #fff; border-radius: 5px; }
        .fill { height: 100%; transition: 0.2s; }
        canvas { display: block; background: #1e90ff; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">🌍 準備冒險...</div>
    <div id="coord" style="font-family: monospace;">X: 0, Y: 0</div>
</nav>

<canvas id="game"></canvas>

<script>
    // --- 核心修正：強制初始化數值，防止 NaN ---
    const user = localStorage.getItem('mc_user') || "冒險者";
    const rank = localStorage.getItem('rank') || "基礎方案";
    document.getElementById('p-info').innerText = `🌍 ${user} 的 ${rank} 宇宙`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const blockSize = 40;
    let world = {}, keys = {}, particles = [];
    
    // 攝影機與玩家位置：強制給予初始數值，防止 NaN
    let camera = { x: 0, y: 0 };
    let player = { 
        x: 400, 
        y: -300, 
        w: 24, 
        h: 34, 
        vx: 0, 
        vy: 0, 
        g: false, 
        hp: 100 
    };

    function spawnParticle(x, y, color) {
        for(let i=0; i<3; i++) particles.push({x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, color});
    }

    function generateColumn(x) {
        if (isNaN(x) || world[x]) return; // 防止 NaN 導致世界崩潰
        let groundY = Math.floor(10 + Math.sin(x * 0.01) * 10);
        world[x] = [];
        for(let y = groundY; y < groundY + 30; y++) {
            world[x].push({ y: y * blockSize, type: y===groundY?'grass':'dirt' });
        }
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        for (let cx of [gx - blockSize, gx, gx + blockSize]) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx + blockSize && tx + player.w > cx && ty < b.y + blockSize && ty + player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    function loop() {
        // --- 核心防消失機制 ---
        // 如果玩家坐標變成 NaN，瞬間強制歸位
        if(isNaN(player.x) || isNaN(player.y)) {
            player.x = 400; 
            player.y = -300; 
            player.vx = 0; 
            player.vy = 0;
            console.error("偵測到座標異常 (NaN)，已強制重置角色位置！");
        }

        // 移動與物理
        player.vx = (keys['KeyD'] ? 5 : 0) + (keys['KeyA'] ? -5 : 0);
        player.x += player.vx;
        let hX = checkColl(player.x, player.y);
        if(hX) player.x = player.vx > 0 ? hX.x - player.w - 0.1 : hX.x + blockSize + 0.1;

        if((keys['Space'] || keys['KeyW']) && player.g) { player.vy = -12; player.g = false; }
        player.vy += 0.6; player.y += player.vy;
        let hY = checkColl(player.x, player.y);
        if(hY) {
            if(player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
            else { player.y = hY.y + blockSize + 0.1; }
            player.vy = 0;
        } else { player.g = false; }

        // 重生保護：掉太深會自動回到地表
        if(player.y > 2500) { player.y = -500; player.vy = 0; }

        // 攝影機隨動修正 (確保 NaN 不會傳遞)
        let targetX = player.x - canvas.width / 2;
        let targetY = player.y - canvas.height / 2;
        if(!isNaN(targetX)) camera.x += (targetX - camera.x) * 0.1;
        if(!isNaN(targetY)) camera.y += (targetY - camera.y) * 0.1;

        // 更新座標顯示
        document.getElementById('coord').innerText = `X: ${Math.round(player.x)}, Y: ${Math.round(-player.y)}`;

        // 地形生成
        let viewDist = 1000; // 視距 1000m
        let sX = Math.floor((player.x - viewDist) / blockSize) * blockSize;
        let eX = Math.floor((player.x + viewDist) / blockSize) * blockSize;
        for(let x = sX; x <= eX; x += blockSize) generateColumn(x);

        // 繪製
        ctx.fillStyle = "#1e90ff"; // 天空藍
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 畫地形
        for(let x in world) {
            const ix = parseInt(x);
            if (ix > camera.x - 100 && ix < camera.x + canvas.width + 100) {
                world[x].forEach(b => {
                    ctx.fillStyle = b.type==='grass'?'#2ed573':'#855c33';
                    ctx.fillRect(ix, b.y, blockSize - 1, blockSize - 1);
                });
            }
        }

        // 畫小人
        ctx.fillStyle = rank === 'VIP方案' ? 'gold' : 'white';
        if(rank === 'VIP方案') { ctx.shadowBlur = 10; ctx.shadowColor = 'gold'; }
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;

        ctx.restore();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
