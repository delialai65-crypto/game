<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 10px; display: flex; justify-content: space-between; z-index: 100; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .menu-btn { width: 200px; padding: 15px; margin: 5px; background: #238636; border: none; color: white; cursor: pointer; }
        .shop-grid { display: flex; gap: 10px; margin-top: 20px; }
        .item { border: 1px solid #fff; padding: 10px; cursor: pointer; }
        canvas { display: block; background: #1e90ff; }
    </style>
</head>
<body>
<nav><div id="info">👤 載入中</div><div id="weapon" style="color:gold">裝備：新手木棍</div><div id="coord">X:0, Y:0</div></nav>
<div id="overlay">
    <h1>選單</h1>
    <button class="menu-btn" onclick="togglePause()">返回遊戲</button>
    <div class="shop-grid">
        <div class="item" onclick="buy('鐵劍',100)">⚔️ 鐵劍 ($100)</div>
        <div class="item" onclick="buy('鑽石劍',500)">💎 鑽石劍 ($500)</div>
    </div>
    <canvas id="map" width="300" height="150" style="background:#000; margin-top:20px; border:1px solid #fff;"></canvas>
    <button class="menu-btn" style="background:#f85149; margin-top:20px;" onclick="window.location.href='index.html'">儲存並離開</button>
</div>
<canvas id="game"></canvas>
<script>
    const user = localStorage.getItem('mc_user') || "冒險者";
    document.getElementById('info').innerText = `🌍 ${user}`;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let isPaused = false;
    let world = {}, entities = [], keys = {}, camera = { x: 0, y: 0 };
    let player = { x: 400, y: -200, w: 24, h: 34, vx: 0, vy: 0, g: false, weaponColor: "#fff" };

    function spawn(t, x){ entities.push({t, x, y:-200, w:24, h:34, vx:0, vy:0, dir:1, hp:50}); }
    for(let i=0;i<3;i++) spawn('villager', 600+i*200);
    setInterval(()=>spawn('monster', player.x+800), 5000);

    function togglePause(){ isPaused = !isPaused; document.getElementById('overlay').style.display = isPaused?'flex':'none'; }
    window.onkeydown=e=>{ if(e.code==='Escape') togglePause(); keys[e.code]=true; };
    window.onkeyup=e=>keys[e.code]=false;

    function buy(n, p){ if(confirm(`購買 ${n}?`)){ player.weaponColor = n==='鐵劍'?'#ced6e0':'#70a1ff'; document.getElementById('weapon').innerText=`裝備：${n}`; togglePause(); } }

    function loop(){
        if(!isPaused){
            player.vx = (keys['KeyD']?6:0)+(keys['KeyA']?-6:0);
            player.x += player.vx;
            player.vy += 0.7; player.y += player.vy;
            if(player.y > 500){ player.y = -200; player.vy = 0; } // 防消失
            let ground = Math.floor(12 + Math.sin(player.x * 0.01) * 8) * 40;
            if(player.y+player.h > ground){ player.y = ground-player.h; player.vy=0; player.g=true; }
            if(keys['Space']&&player.g){ player.vy=-13; player.g=false; }
            
            entities.forEach(ent=>{
                ent.vx = ent.t==='villager'?ent.dir*1.5:(player.x>ent.x?2.5:-2.5);
                ent.x += ent.vx; ent.vy+=0.7; ent.y+=ent.vy;
                let eg = Math.floor(12 + Math.sin(ent.x * 0.01) * 8) * 40;
                if(ent.y+ent.h > eg){ ent.y = eg-ent.h; ent.vy=0; }
            });
        }
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        ctx.fillStyle = "#1e90ff"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        for(let x=Math.floor((player.x-1000)/40)*40; x<player.x+1000; x+=40){
            let gy = Math.floor(12 + Math.sin(x * 0.01) * 8);
            ctx.fillStyle = '#2ed573'; ctx.fillRect(x, gy*40, 39, 39);
        }
        entities.forEach(ent=>{ ctx.fillStyle=ent.t==='villager'?'#ffa502':'#ff4757'; ctx.fillRect(ent.x, ent.y, ent.w, ent.h); });
        ctx.fillStyle = player.weaponColor; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
        document.getElementById('coord').innerText = `X:${Math.round(player.x)}, Y:${Math.round(-player.y)}`;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
