<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 物理修正版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        #esc-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .shop { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #ffca28; width: 400px; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .item { padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <div>❤️ HP: <span id="hp">20</span> | 🟡 SUPER: <span id="pts">0</span></div>
    <div>按 <b>B</b> 炸彈 | 按 <b>ESC</b> 商店</div>
</nav>

<div id="esc-menu">
    <div class="shop">
        <h2 style="color:#ffca28">軍事商店</h2>
        <div class="btn-grid">
            <div class="item" onclick="buy('導彈', 500)">🚀 導彈</div>
            <div class="item" onclick="buy('戰車', 2000)">🚜 戰車</div>
            <div class="item" onclick="buy('核彈', 50000)">☢️ 核彈</div>
        </div>
        <button onclick="toggleEsc()" style="padding:10px 20px; cursor:pointer;">返回</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    
    let player = { x: 400, y: 100, w: 24, h: 36, vx: 0, vy: 0, ground: false, hp: 20 };
    let world = {}, bombs = [], explosions = [], keys = {}, isEsc = false, superPts = 0;

    // 生成填滿地圖
    function gen(gx) {
        if (world[gx]) return;
        world[gx] = {};
        for(let y = 10; y < 25; y++) world[gx][y * blockSize] = '#2ecc71';
    }

    function toggleEsc() { isEsc = !isEsc; document.getElementById('esc-menu').style.display = isEsc?'flex':'none'; }
    function buy(n, p) { alert(superPts >= p ? `已購買 ${n}` : "點數不足"); }

    // --- 關鍵修正：防穿牆物理引擎 ---
    function checkCollision(x, y) {
        let gx = Math.floor(x / blockSize) * blockSize;
        let gy = Math.floor(y / blockSize) * blockSize;
        return (world[gx] && world[gx][gy]);
    }

    function applyPhysics() {
        player.vy += 0.8; // 重力
        
        // 預測 X 軸移動
        let nextX = player.x + player.vx;
        if (!checkCollision(nextX, player.y) && !checkCollision(nextX + player.w, player.y) &&
            !checkCollision(nextX, player.y + player.h) && !checkCollision(nextX + player.w, player.y + player.h)) {
            player.x = nextX;
        }

        // 預測 Y 軸移動
        let nextY = player.y + player.vy;
        if (checkCollision(player.x, nextY + player.h) || checkCollision(player.x + player.w, nextY + player.h)) {
            player.y = Math.floor((nextY + player.h) / blockSize) * blockSize - player.h;
            player.vy = 0;
            player.ground = true;
        } else if (checkCollision(player.x, nextY) || checkCollision(player.x + player.w, nextY)) {
            player.vy = 0; // 撞到天花板
        } else {
            player.y = nextY;
            player.ground = false;
        }
    }

    // B 鍵炸彈 3 秒邏輯
    function placeBomb() {
        let b = { x: Math.floor(player.x/40)*40, y: Math.floor(player.y/40)*40 };
        bombs.push(b);
        setTimeout(() => {
            bombs.shift();
            explosions.push({ x: b.x+20, y: b.y+20, r: 0 });
            // 炸毀周圍
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
                let tx = b.x + i*40, ty = b.y + j*40;
                if(world[tx]) delete world[tx][ty];
            }
        }, 3000);
    }

    window.onkeydown = e => {
        if(e.code === 'Escape') toggleEsc();
        if(e.code === 'KeyB' && !isEsc) placeBomb();
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(!isEsc) {
            player.vx = (keys['KeyD']?5:0) + (keys['KeyA']?-5:0);
            if((keys['Space'] || keys['KeyW']) && player.ground) player.vy = -12;
            applyPhysics();
            for(let i=player.x-600; i<player.x+600; i+=blockSize) gen(Math.floor(i/blockSize)*blockSize);
            superPts++;
        }

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-(player.x - canvas.width/2), -(player.y - canvas.height/2));
        
        for(let x in world) for(let y in world[x]) {
            ctx.fillStyle = world[x][y];
            ctx.fillRect(x, parseInt(y), blockSize-1, blockSize-1);
        }
        
        bombs.forEach(b => { ctx.fillStyle="red"; ctx.fillRect(b.x+10, b.y+10, 20, 20); });
        explosions.forEach((ex, i) => {
            ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.fill();
            ex.r += 4; if(ex.r > 80) explosions.splice(i, 1);
        });

        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
        document.getElementById('pts').innerText = superPts;
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
