<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 山脈荒野</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #87CEEB; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; border-bottom: 2px solid #555; }
        
        /* 聊天室 */
        #chat-box { position: fixed; bottom: 100px; left: 20px; width: 300px; height: 120px; background: rgba(0,0,0,0.4); color: white; padding: 10px; overflow-y: auto; font-size: 13px; display: none; border-radius: 4px; pointer-events: none; }
        #chat-input { position: fixed; bottom: 60px; left: 20px; width: 300px; padding: 8px; background: rgba(0,0,0,0.9); color: white; border: 1px solid #ffca28; display: none; outline: none; }
        
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px; border: 1px solid #fff; border-radius: 8px; }
        .slot { width: 45px; height: 45px; border: 1px solid #444; display: flex; justify-content: center; align-items: center; color: white; font-size: 20px; cursor: pointer; }
        .slot.active { border: 2px solid #ffca28; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<nav>
    <div>👤 <span id="p-name">載入中</span> | ❤️ HP: <span id="hp">20</span> | 🟡 SUPER: <span id="pts">0</span></div>
    <div style="font-size: 12px; color: #aaa;">滑鼠左鍵:挖掘 | 右鍵:放置 | K:攻擊 | Enter:聊天</div>
</nav>

<div id="chat-box"></div>
<input type="text" id="chat-input" placeholder="輸入訊息後按 Enter...">

<div id="hotbar">
    <div class="slot active" id="s1" onclick="sel(1)">🌱</div>
    <div class="slot" id="s2" onclick="sel(2)">🧱</div>
    <div class="slot" id="s3" onclick="sel(3)">🪵</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const blockSize = 40;
    const params = new URLSearchParams(window.location.search);
    const botCount = parseInt(params.get('players')) || 1;

    let player = { x: 400, y: -200, w: 24, h: 36, vx: 0, vy: 0, ground: false, hp: 20 };
    let world = {}, entities = [], keys = {}, selected = '#2ecc71', isChatting = false;
    let superPts = 0, camera = { x: 400, y: 0 };

    document.getElementById('p-name').innerText = localStorage.getItem('mc_user') || "冒險者";

    if(botCount > 1) {
        for(let i=0; i<botCount-1; i++) entities.push({ x: 420+i*20, y: -200, vx: 0, vy: 0, type: 'mate' });
    }

    // --- 核心更新：山脈生成算法 ---
    function gen(gx) {
        if (world[gx]) return;
        const x = gx / blockSize;
        
        // 使用正弦波疊加模擬山脈起伏
        // 大波浪 (山脈) + 小波浪 (平原起伏)
        let mountainHeight = Math.sin(x * 0.05) * 8; 
        let detailHeight = Math.sin(x * 0.2) * 2;
        let groundY = Math.floor(15 + mountainHeight + detailHeight); 

        world[gx] = {};
        for(let y = groundY; y < groundY + 40; y++) { // 填滿 40 層地層
            let type = '#7f8c8d'; // 石頭
            if (y === groundY) type = '#2ecc71'; // 草地
            else if (y < groundY + 4) type = '#8b5a2b'; // 泥土
            
            world[gx][y * blockSize] = type;
        }
    }

    // --- 滑鼠互動 ---
    canvas.onmousedown = e => {
        if(isChatting) return;
        let mx = Math.floor((e.clientX + camera.x - canvas.width/2) / blockSize) * blockSize;
        let my = Math.floor((e.clientY + camera.y - canvas.height/2) / blockSize) * blockSize;
        if(e.button === 0) { if(world[mx]) delete world[mx][my]; }
        else if(e.button === 2) { if(!world[mx]) world[mx] = {}; world[mx][my] = selected; }
    };
    canvas.oncontextmenu = e => e.preventDefault();

    function addChat(msg, name="[系統]") {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div><b>${name}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // --- 嚴格物理與防穿牆 ---
    function check(x, y) {
        let gx = Math.floor(x/40)*40;
        let gy = Math.floor(y/40)*40;
        return world[gx] && world[gx][gy];
    }

    function applyPhysics(obj) {
        obj.vy += 0.8;
        let nextY = obj.y + obj.vy;
        
        // 腳下偵測
        if (check(obj.x, nextY+36) || check(obj.x+24, nextY+36)) {
            obj.y = Math.floor((nextY+36)/40)*40-36;
            obj.vy = 0;
            obj.ground = true;
        } else {
            obj.y = nextY;
            obj.ground = false;
        }

        // 水平防穿牆
        let nextX = obj.x + (obj.vx || 0);
        if (!check(nextX, obj.y+5) && !check(nextX+24, obj.y+5) && 
            !check(nextX, obj.y+30) && !check(nextX+24, obj.y+30)) {
            obj.x = nextX;
        }
    }

    window.onkeydown = e => {
        if(e.code === 'Enter') {
            isChatting = !isChatting;
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            if(isChatting) { input.style.display = box.style.display = 'block'; input.focus(); }
            else { if(input.value) addChat(input.value, "我"); input.value = ''; input.style.display = 'none'; }
        }
        if(!isChatting) {
            keys[e.code] = true;
            if(e.code === 'KeyK') addChat("發動揮劍攻擊！", "戰鬥");
        }
    };
    window.onkeyup = e => keys[e.code] = false;

    function sel(n) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        selected = ['#2ecc71', '#7f8c8d', '#8b5a2b'][n-1];
    }

    function loop() {
        if(!isChatting) {
            player.vx = (keys['KeyD']?6:0) + (keys['KeyA']?-6:0);
            if((keys['Space'] || keys['KeyW']) && player.ground) player.vy = -14;
            applyPhysics(player);
            entities.forEach(en => {
                en.vx = (player.x - en.x) * 0.05; // 隊友跟隨效果
                applyPhysics(en);
            });
            for(let i=player.x-1000; i<player.x+1000; i+=blockSize) gen(Math.floor(i/blockSize)*blockSize);
            superPts++;
        }

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(-(camera.x - canvas.width/2), -(camera.y - canvas.height/2));
        
        for(let x in world) {
            for(let y in world[x]) {
                ctx.fillStyle = world[x][y];
                ctx.fillRect(x, parseInt(y), 39, 39);
            }
        }
        entities.forEach(en => { ctx.fillStyle="#e67e22"; ctx.fillRect(en.x, en.y, 24, 36); });
        ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, 24, 36);
        ctx.restore();

        document.getElementById('pts').innerText = superPts;
        requestAnimationFrame(loop);
    }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); };
</script>
</body>
</html>
