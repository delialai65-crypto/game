<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>結帳資料</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 20px; width: 400px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; color: white; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">結帳資料</h2>
        <input type="text" id="name" placeholder="真實姓名">
        <input type="tel" id="phone" placeholder="電話">
        <div id="card-box" style="display:none">
            <select id="bank"><option value="">選擇銀行</option><option value="玉山">玉山</option><option value="中信">中信</option><option value="國泰">國泰</option></select>
            <input type="text" placeholder="卡號">
        </div>
        <button onclick="done()">確認付款</button>
    </div>
    <script>
        const m = localStorage.getItem('selected_method');
        document.getElementById('title').innerText = m;
        if(m.includes('信用卡')) document.getElementById('card-box').style.display='block';
        function done(){
            const code = "MC-"+Math.random().toString(36).substr(2,4).toUpperCase();
            localStorage.setItem('current_code',code);
            alert("支付成功！啟動碼："+code);
            window.location.href='verify.html';
        }
    </script>
</body>
</html>
