<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>安全支付 - 嚴格資料查驗</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 20px; width: 450px; border: 1px solid #333; text-align: center; }
        .price { color: #2ecc71; font-size: 28px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; text-align: left; font-size: 13px; color: #8b949e; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; box-sizing: border-box; outline: none; }
        .loading { display: none; color: #58a6ff; font-size: 14px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #30363d; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="method-name">支付授權</h2>
        <div id="price-display" class="price">NT$ 0</div>
        
        <div style="text-align: left;">
            <label>付款人真實姓名</label>
            <input type="text" id="u-name" placeholder="請輸入身分證字號對應姓名">
            
            <label>聯絡電話 (需通過查驗)</label>
            <input type="number" id="u-phone" placeholder="09XXXXXXXX">

            <div id="bank-section" style="display:none;">
                <label>發卡銀行</label>
                <select id="u-bank">
                    <option value="">請選擇銀行</option>
                    <option value="808 玉山銀行">808 玉山銀行</option>
                    <option value="822 中國信託">822 中國信託</option>
                    <option value="013 國泰世華">013 國泰世華</option>
                    <option value="700 中華郵政">700 中華郵政</option>
                    <option value="999 其他銀行">其他銀行...</option>
                </select>
            </div>
        </div>

        <div id="check-status" class="loading">正在查驗付款人資料與信用額度...</div>
        <button id="pay-btn" onclick="startCheck()">確認支付並領取道具</button>
    </div>

    <script>
        const method = localStorage.getItem('selected_method') || "全支付";
        const price = localStorage.getItem('temp_price') || "0";
        document.getElementById('method-name').innerText = method;
        document.getElementById('price-display').innerText = "NT$ " + price;

        if(method.includes("信用卡")) document.getElementById('bank-section').style.display = "block";

        function startCheck() {
            const name = document.getElementById('u-name').value.trim();
            const phone = document.getElementById('u-phone').value.trim();
            const status = document.getElementById('check-status');
            const btn = document.getElementById('pay-btn');

            // --- 嚴格查驗邏輯 ---
            
            // 1. 基本長度與無效數字攔截
            if (name.length < 2 || name === "0" || name === "123") {
                return alert("❌ 查驗失敗：請輸入真實的付款人姓名。");
            }

            // 2. 電話格式與合理性查驗
            if (!phone.startsWith("09") || phone.length !== 10 || phone === "0900000000") {
                return alert("❌ 查驗失敗：聯絡電話無效或查無此號。");
            }

            // --- 模擬雲端資料庫查驗流程 ---
            btn.disabled = true;
            status.style.display = "block";
            
            let progress = 0;
            const checkInt = setInterval(() => {
                progress += 33;
                if (progress === 33) status.innerText = "正在向金流服務商核對身分...";
                if (progress === 66) status.innerText = "正在查驗電話號碼實名制...";
                if (progress >= 99) {
                    clearInterval(checkInt);
                    status.style.display = "none";
                    btn.disabled = false;
                    
                    // 查驗通過，執行最後付款
                    const code = "MC-" + Math.random().toString(36).substr(2, 4).toUpperCase();
                    localStorage.setItem('current_code', code);
                    alert(`✅ 查驗通過！\n${method} 授權成功。\n啟動碼已生成：${code}`);
                    window.location.href = 'verify.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
