<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>安全支付 - 遠征隊系統</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .pay-card { background: #161b22; padding: 30px; border-radius: 20px; width: 100%; max-width: 480px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .form-section { text-align: left; margin-top: 20px; }
        label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        
        /* 隱藏數字輸入框的箭頭 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .price-info { font-size: 24px; color: #2ecc71; font-weight: bold; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        
        /* 付款成功彈窗 */
        #success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: #1c2128; padding: 40px; border-radius: 20px; border: 2px solid #2ecc71; text-align: center; max-width: 400px; }
        .code-display { background: #000; color: #2ecc71; padding: 20px; font-family: monospace; font-size: 24px; border-radius: 10px; margin: 20px 0; border: 1px dashed #2ecc71; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2 id="m-title">結帳資訊</h2>
    <div id="p-display" class="price-info">NT$ 0</div>

    <div class="form-section">
        <label>真實姓名</label>
        <input type="text" id="u-name" placeholder="請輸入姓名">
        
        <label>聯絡電話</label>
        <input type="number" id="u-phone" placeholder="09XXXXXXXX">
        
        <label>電子信箱 (僅作紀錄用)</label>
        <input type="email" id="u-email" placeholder="example@gmail.com">

        <div id="card-fields" style="display:none;">
            <label>信用卡資訊</label>
            <input type="number" placeholder="卡號">
            <div style="display:flex; gap:10px;">
                <input type="number" placeholder="MM/YY">
                <input type="number" placeholder="CVV">
            </div>
        </div>

        <button onclick="process()">確認支付並獲取代碼</button>
    </div>
</div>

<div id="success-modal">
    <div class="modal-box">
        <h2 style="color: #2ecc71;">✅ 支付成功！</h2>
        <p>請記下您的專屬啟動碼：</p>
        <div class="code-display" id="final-code">MC-XXXX-XXXX</div>
        <p style="font-size: 12px; color: #8b949e;">(建議截圖或複製，稍後驗證時使用)</p>
        <button onclick="window.location.href='verify.html'" style="background: #58a6ff;">前往驗證頁面</button>
    </div>
</div>

<script>
    const method = localStorage.getItem('selected_method') || "支付方式";
    const plan = localStorage.getItem('temp_plan') || "基礎方案";
    const price = localStorage.getItem('temp_price') || "150";

    document.getElementById('m-title').innerText = `${method} 結帳`;
    document.getElementById('p-display').innerText = `NT$ ${price}`;
    
    if(method.includes('信用卡')) document.getElementById('card-fields').style.display = 'block';

    function process() {
        if(!document.getElementById('u-name').value || !document.getElementById('u-phone').value) {
            return alert("請填寫基本資料");
        }

        // 生成啟動碼
        const code = "MC-" + Math.random().toString(36).substr(2, 4).toUpperCase() + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('current_code', code);
        localStorage.setItem('rank', plan);

        // 顯示成功視窗
        document.getElementById('final-code').innerText = code;
        document.getElementById('success-modal').style.display = 'flex';
    }
</script>

</body>
</html>
