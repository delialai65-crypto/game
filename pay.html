<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>安全支付中心 - 遠征隊系統</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .pay-container { background: #161b22; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #30363d; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .order-summary { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid #2ecc71; text-align: left; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #58a6ff; }
        
        .flex-row { display: flex; gap: 15px; }
        .flex-row div { flex: 1; }

        .btn-pay { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .btn-pay:hover { background: #2ea043; transform: translateY(-2px); }
        .btn-pay:disabled { background: #333; cursor: not-allowed; }

        /* 載入動畫 */
        #loading { display: none; margin-top: 20px; color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="pay-container">
    <div class="order-summary">
        <div style="font-size: 12px; color: #8b949e;">訂單明細</div>
        <div id="display-plan" style="font-size: 18px; font-weight: bold;">方案載入中...</div>
        <div id="display-price" style="font-size: 22px; color: #2ecc71; font-weight: bold;">$0</div>
    </div>

    <div class="form-group">
        <label>持卡人姓名</label>
        <input type="text" id="card-name" placeholder="例如：CHEN XIAO MING">
    </div>

    <div class="form-group">
        <label>信用卡卡號</label>
        <input type="text" id="card-num" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
    </div>

    <div class="flex-row">
        <div class="form-group">
            <label>到期日 (MM/YY)</label>
            <input type="text" id="card-exp" placeholder="MM/YY" maxlength="5">
        </div>
        <div class="form-group">
            <label>安全碼 (CVV)</label>
            <input type="password" id="card-cvv" placeholder="123" maxlength="3">
        </div>
    </div>

    <div class="form-group">
        <label>電子信箱 (用以接收啟動碼)</label>
        <input type="email" id="user-email" placeholder="example@gmail.com">
    </div>

    <button class="btn-pay" onclick="startPay()">確認付款並取得啟動碼</button>
    <div id="loading">🔒 安全支付授權中，請稍後...</div>
</div>

<script>
    // 讀取上一頁傳來的方案資訊
    const plan = localStorage.getItem('temp_plan') || "基礎方案";
    const price = localStorage.getItem('temp_price') || "150";
    document.getElementById('display-plan').innerText = plan;
    document.getElementById('display-price').innerText = `NT$ ${price}`;

    // 格式化卡號輸入
    document.getElementById('card-num').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    function startPay() {
        const name = document.getElementById('card-name').value;
        const num = document.getElementById('card-num').value;
        const email = document.getElementById('user-email').value;

        if(!name || num.length < 16 || !email) {
            return alert("請填寫正確的付款資訊！");
        }

        // 顯示載入中
        document.querySelector('.btn-pay').disabled = true;
        document.getElementById('loading').style.display = 'block';

        // 模擬伺服器延遲
        setTimeout(() => {
            // 生成隨機啟動碼
            const randomCode = "MC-" + Math.random().toString(36).substr(2, 4).toUpperCase() + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem('current_code', randomCode);
            localStorage.setItem('rank', plan);
            
            alert(`✅ 付款成功！\n\n系統已發送啟動碼至：${email}\n您的啟動碼為：${randomCode}`);
            window.location.href = 'verify.html'; // 前往驗證頁
        }, 3000);
    }
</script>

</body>
</html>
