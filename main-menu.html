<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征世界 - 伺服器中心</title>
    <style>
        :root { --primary: #238636; --bg: #0d1117; --card: #161b22; --accent: #ffca28; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* 主卡片 */
        .container { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #30363d; width: 420px; text-align: center; position: relative; }
        h1 { color: var(--accent); margin-bottom: 25px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }

        .btn-start { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .btn-change { background: none; border: none; color: #58a6ff; cursor: pointer; margin-top: 15px; text-decoration: underline; font-size: 14px; }

        /* --- 方案選擇彈窗 (取代 shop.html) --- */
        #shop-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .shop-content { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); width: 80%; max-width: 800px; text-align: center; }
        .plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .plan-card { background: #000; border: 1px solid #333; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .plan-card:hover { border-color: var(--accent); transform: scale(1.05); }
        .price { color: var(--accent); font-size: 24px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>遠征伺服器</h1>
        <div class="form-group">
            <label>伺服器名稱</label>
            <input type="text" id="srv-name" placeholder="嫦瑜的秘密基地">
        </div>

        <div class="form-group">
            <label>最大人數 (當前方案限制: <span id="current-limit">2</span> 人)</label>
            <select id="max-players">
                <option value="2">2 人</option>
                <option value="10">10 人</option>
                <option value="25">25 人</option>
                <option value="50">50 人</option>
            </select>
        </div>

        <button class="btn-start" onclick="launch()">啟動遠征伺服器</button>
        <br>
        <button class="btn-change" onclick="openShop()">✨ 變更人數方案</button>
    </div>

    <div id="shop-modal">
        <div class="shop-content">
            <h2 style="color:var(--accent)">升級遠征方案</h2>
            <div class="plan-grid">
                <div class="plan-card" onclick="updatePlan(10, 150)">
                    <h3>🌱 入門</h3>
                    <div class="price">NT$ 150</div>
                    <p>10 人上限</p>
                </div>
                <div class="plan-card" onclick="updatePlan(25, 450)" style="border-color:var(--primary)">
                    <h3>🛠️ 高級</h3>
                    <div class="price">NT$ 450</div>
                    <p>25 人上限</p>
                </div>
                <div class="plan-card" onclick="updatePlan(50, 990)">
                    <h3>👑 至尊</h3>
                    <div class="price">NT$ 990</div>
                    <p>50 人上限</p>
                </div>
            </div>
            <button class="btn-change" style="color:white" onclick="closeShop()">取消並返回</button>
        </div>
    </div>

    <script>
        // 初始檢查方案
        function refreshLimit() {
            const limit = localStorage.getItem('max_allowed_players') || 2;
            document.getElementById('current-limit').innerText = limit;
            
            const select = document.getElementById('max-players');
            for(let i=0; i<select.options.length; i++) {
                select.options[i].disabled = (parseInt(select.options[i].value) > limit);
            }
        }

        function openShop() { document.getElementById('shop-modal').style.display = 'flex'; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

        function updatePlan(num, price) {
            if(confirm(`確認要購買 ${num} 人方案嗎？`)) {
                localStorage.setItem('max_allowed_players', num);
                alert("方案更新成功！請重新選擇人數。");
                refreshLimit();
                closeShop();
            }
        }

        function launch() {
            const name = document.getElementById('srv-name').value || "未命名伺服器";
            const p = document.getElementById('max-players').value;
            window.location.href = `game.html?players=${p}&mode=survival`;
        }

        window.onload = refreshLimit;
    </script>
</body>
</html>
