<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 伺服器大廳</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .server-box { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; }
        .btn:hover { background: #2ea043; }
        .tag { color: #ffca28; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="server-box">
        <h1>建立遠征伺服器</h1>
        <p class="tag">只有持有啟動碼 RYAN0111407 的玩家可擔任房主</p>
        
        <input type="text" id="server-name" placeholder="輸入伺服器名稱 (例如: 嫦瑜的冒險)">
        
        <label>最大連線人數</label>
        <select id="max-players">
            <option value="2">2 人</option>
            <option value="10">10 人</option>
            <option value="50">50 人 (最高規格)</option>
        </select>

        <label>遊戲模式</label>
        <select id="game-mode">
            <option value="survival">生存模式 (晚上有怪物)</option>
            <option value="creative">創造模式 (無敵、無限方塊)</option>
        </select>

        <button class="btn" onclick="startServer()">啟動伺服器並進入</button>
    </div>

    <script>
        function startServer() {
            const name = document.getElementById('server-name').value || "未命名伺服器";
            const players = document.getElementById('max-players').value;
            const mode = document.getElementById('game-mode').value;
            
            // 儲存伺服器設定
            localStorage.setItem('current_server_name', name);
            
            // 帶參數進入遊戲畫面
            window.location.href = `game.html?players=${players}&mode=${mode}`;
        }
    </script>
</body>
</html>
