<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>遠征世界 - 模式選擇</title>
    <style>
        :root { --primary: #238636; --accent: #ffca28; --bg: #0d1117; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .menu-card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; width: 400px; text-align: center; }
        .mode-btn { width: 100%; padding: 20px; margin: 10px 0; border: 2px solid #30363d; border-radius: 12px; background: #000; color: white; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .mode-btn:hover { border-color: var(--accent); background: #1c2128; }
        .mode-btn span { display: block; font-size: 12px; color: #8b949e; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="menu-card">
        <h1 style="color:var(--accent)">遠征世界</h1>
        <button class="mode-btn" onclick="start('single')">🕹️ 單人模式<span>獨自在荒野生存與建築</span></button>
        <button class="mode-btn" onclick="start('multi')">🌐 多人模式<span>與 50 位遠征隊員共同作戰</span></button>
        <p style="font-size:12px; color:#555;">啟動碼 RYAN0111407 已驗證</p>
    </div>
    <script>
        function start(mode) {
            const players = (mode === 'single') ? 1 : 50;
            window.location.href = `game.html?players=${players}&mode=${mode}`;
        }
    </script>
</body>
</html>
