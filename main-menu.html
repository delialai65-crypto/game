<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>Minecraft - 遠征隊啟動器</title>
    <style>
        body { margin: 0; background: url('https://files.catbox.moe/k3h57k.jpg') center; background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        .btn { width: 400px; padding: 15px; margin: 5px; background: #4e4e4e; border: 2px solid #000; color: white; cursor: pointer; text-align: center; text-shadow: 2px 2px #000; }
        .btn:hover { border-color: #fff; background: #6e6e6e; }
        /* 鎖定樣式 */
        .locked { filter: grayscale(1); opacity: 0.6; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" width="500">

    <div style="margin-top:20px">
        <div class="btn" onclick="checkPurchase('single')">單人遊戲</div>
        <div class="btn" onclick="checkPurchase('multi')">多人遊戲</div>
        <div class="btn" onclick="location.href='index.html'">退出遊戲</div>
    </div>

<script>
    function checkPurchase(mode) {
        // 從 LocalStorage 檢查是否有啟動紀錄 (game_active)
        const isBought = localStorage.getItem('game_active');

        if (isBought === 'true') {
            // 已購買：根據模式進入遊戲
            alert("✅ 驗證成功，正在載入世界...");
            window.location.href = `game.html?mode=${mode}`;
        } else {
            // 未購買：顯示「未查詢到購買紀錄」並引導至商店
            const name = localStorage.getItem('mc_user') || "冒險者";
            alert(`⚠️ 抱歉，${name}。\n系統未查詢到您的購買紀錄或啟動序號。\n請先前往產品網頁購買遊戲。`);
            
            // 自動跳轉到產品選擇大廳
            window.location.href = 'product-selection.html';
        }
    }
</script>

</body>
</html>
