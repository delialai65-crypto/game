<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>豪華鐵路訂票系統 - 100車次旗艦版</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #334155; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #334155; color: white; box-sizing: border-box; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .train-list { height: 350px; overflow-y: auto; padding-right: 10px; }
        .train-item { background: #334155; padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .train-item:hover { border: 1px solid var(--primary); }
        .page { display: none; }
        .active { display: block; }
        #bookingBox { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 會員中心 -->
    <div id="authPage" class="box page active">
        <h2 style="text-align:center">系統登入</h2>
        <input type="text" placeholder="請輸入帳號">
        <input type="password" placeholder="請輸入密碼">
        <button onclick="show('searchPage')">登入並進入系統</button>
    </div>

    <!-- 2. 100 車次查詢 -->
    <div id="searchPage" class="box page">
        <h3>🚄 100 種車次時刻表</h3>
        <select><option>台北</option><option>台中</option><option>高雄</option><option>花蓮</option></select>
        <select><option>台北</option><option>台中</option><option>高雄</option><option>花蓮</option></select>
        <button onclick="generate100Trains()">載入所有車次 (100種)</button>
        <div id="results" class="train-list"></div>

        <div id="bookingBox">
            <h4 style="margin-top:0">訂購確認</h4>
            人數：<input type="number" value="1" min="1">
            <label><input type="checkbox"> 加購豪華便當</label>
            <button onclick="show('payPage')" style="margin-top:10px">確認結帳</button>
        </div>
    </div>

    <!-- 3. 付款與 QR Code -->
    <div id="payPage" class="box page" style="text-align:center;">
        <h3>安全支付與領票</h3>
        <input type="text" placeholder="信用卡號 (XXXX-XXXX-XXXX-XXXX)">
        <button onclick="finish()">完成付款</button>
        <div id="qrArea" style="margin-top:20px; background:white; padding:10px; border-radius:10px; display:none;"></div>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function generate100Trains() {
        let html = "";
        for(let i=0; i<100; i++) {
            let type = (i%3===0 ? "普悠瑪" : (i%3===1 ? "新自強" : "區間車"));
            html += `<div class="train-item" onclick="document.getElementById('bookingBox').style.display='block'">
                <span><b>${type} #${1000+i}</b></span>
                <span>${Math.floor(i/4)%24}:00</span>
            </div>`;
        }
        document.getElementById('results').innerHTML = html;
    }

    function finish() {
        document.getElementById('qrArea').style.display = 'block';
        let code = Math.floor(10000000 + Math.random()*90000000);
        document.getElementById('qrArea').innerHTML = `
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${code}">
            <p style="color:black">驗證碼: ${code}</p>
            <button onclick="location.reload()" style="background:#dc2626">返回首頁</button>
        `;
    }
</script>
</body>
</html>
