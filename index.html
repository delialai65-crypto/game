<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征隊 - 帳號建立</title>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #161b22; padding: 40px; border-radius: 12px; border: 1px solid #333; width: 380px; text-align: center; }
        h2 { color: #2ecc71; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #58a6ff; }
        .btn { width: 100%; padding: 14px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #2ea043; }
        .switch-link { color: #8b949e; font-size: 13px; margin-top: 15px; cursor: pointer; text-decoration: underline; display: block; }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" height="25" style="margin-bottom: 20px;">
        
        <div id="reg-section">
            <h2>第一步：建立帳號</h2>
            <p style="font-size: 12px; color: #8b949e;">請先完成註冊以加入遠征隊</p>
            <input type="text" id="r-name" placeholder="您的真實姓名">
            <input type="text" id="r-acc" placeholder="設定登入帳號">
            <input type="password" id="r-pwd" placeholder="設定密碼">
            <button class="btn" onclick="register()">完成註冊</button>
            <span class="switch-link" onclick="toggleMode('login')">我已經有帳號了，直接登入</span>
        </div>

        <div id="login-section" style="display: none;">
            <h2>第二步：登入系統</h2>
            <input type="text" id="l-acc" placeholder="輸入帳號">
            <input type="password" id="l-pwd" placeholder="輸入密碼">
            <button class="btn" style="background: #58a6ff;" onclick="login()">登入並驗證啟動碼</button>
            <span class="switch-link" onclick="toggleMode('reg')">返回註冊頁面</span>
        </div>
    </div>

    <script>
        // 切換顯示模式
        function toggleMode(mode) {
            const reg = document.getElementById('reg-section');
            const log = document.getElementById('login-section');
            if (mode === 'login') {
                reg.style.display = 'none';
                log.style.display = 'block';
            } else {
                reg.style.display = 'block';
                log.style.display = 'none';
            }
        }

        // 註冊邏輯
        function register() {
            const name = document.getElementById('r-name').value;
            const acc = document.getElementById('r-acc').value;
            const pwd = document.getElementById('r-pwd').value;

            if (!name || !acc || !pwd) return alert("請完整填寫註冊資料！");

            // 將註冊資料存入資料庫 (LocalStorage)
            localStorage.setItem('mc_user', name);
            localStorage.setItem('mc_acc', acc);
            localStorage.setItem('mc_pwd', pwd);

            alert("🎉 註冊成功！現在請進行登入。");
            toggleMode('login'); // 自動切換到登入介面
        }

        // 登入邏輯
        function login() {
            const acc = document.getElementById('l-acc').value;
            const pwd = document.getElementById('l-pwd').value;

            // 檢查是否與註冊資料相符
            const savedAcc = localStorage.getItem('mc_acc');
            const savedPwd = localStorage.getItem('mc_pwd');

            if (acc === savedAcc && pwd === savedPwd) {
                alert("✅ 登入成功！");
                window.location.href = 'verify.html'; // 進入啟動碼輸入頁面
            } else {
                alert("❌ 帳號或密碼錯誤，或您尚未註冊。");
            }
        }
    </script>
</body>
</html>
