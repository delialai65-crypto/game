<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>購買 MINECRAFT - 遠征隊授權</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; }
        .nav-bar { background: #1a1a1a; padding: 10px 50px; display: flex; align-items: center; border-bottom: 3px solid #333; }
        .logo { height: 25px; margin-right: 30px; }
        
        .container { display: flex; max-width: 1200px; margin: 40px auto; gap: 30px; padding: 0 20px; }
        
        /* 左側封面區 */
        .preview-side { flex: 1.2; background: #161b22; border: 1px solid #333; padding: 20px; border-radius: 4px; }
        .preview-side img { width: 100%; border-radius: 4px; }
        .preview-title { font-size: 28px; font-weight: bold; margin: 20px 0; letter-spacing: 1px; }

        /* 右側方案選單 */
        .plans-side { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .plan-box { 
            background: #1a1a1a; border: 2px solid #333; border-radius: 8px; 
            padding: 20px; cursor: pointer; position: relative; transition: 0.2s;
        }
        .plan-box:hover { border-color: #555; }
        .plan-box.selected { border-color: #2ecc71; background: #21262d; }
        
        .badge { background: #2ed573; color: #000; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 2px; position: absolute; top: -10px; left: 20px; }
        .plan-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .plan-desc { font-size: 12px; color: #8b949e; line-height: 1.5; }
        .plan-price { font-size: 18px; font-weight: bold; margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .radio-circle { width: 16px; height: 16px; border: 2px solid #555; border-radius: 50%; display: inline-block; }
        .selected .radio-circle { border-color: #2ecc71; background: #2ecc71; box-shadow: inset 0 0 0 3px #21262d; }

        /* 底部按鈕 */
        .footer-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-cart { background: #333; color: white; border: 1px solid #555; }
        .btn-next { background: #2ecc71; color: black; }
    </style>
</head>
<body>

<div class="nav-bar">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" class="logo">
    <span style="font-size: 12px; color: #8b949e;">遊戲 &nbsp;&nbsp; 社群 &nbsp;&nbsp; 學習 &nbsp;&nbsp; 支援</span>
</div>

<div class="container">
    <div class="preview-side">
        <img src="https://files.catbox.moe/k3h57k.jpg" alt="Minecraft Deluxe"> <div class="preview-title">PC 版的 MINECRAFT：JAVA 版和 BEDROCK 版</div>
        <div style="color: gold; font-size: 14px;">★★★★★ (4.7) 842.8K</div>
        <div style="margin-top: 10px; font-size: 12px; color: #8b949e;">Windows | Mac | Linux</div>
    </div>

    <div class="plans-side">
        <div style="font-size: 12px; color: #8b949e; margin-bottom: 5px;">選擇版本</div>

        <div class="plan-box" id="p3" onclick="selectPlan('p3', '終極收藏包', 1126, 'multi')">
            <div class="badge">最佳價值！</div>
            <div class="plan-name">終極收藏包</div>
            <div class="plan-desc">包含 Java & Bedrock 版、啟動器、1,000 枚代幣、地圖包與全套角色飾品。</div>
            <div class="plan-price"><span class="radio-circle"></span> $1,126.00</div>
        </div>

        <div class="plan-box selected" id="p2" onclick="selectPlan('p2', '豪華收藏包', 901, 'multi')">
            <div class="plan-name">豪華收藏包</div>
            <div class="plan-desc">包含 Java & Bedrock 版、啟動器、700 枚代幣與 3 個專屬角色。</div>
            <div class="plan-price"><span class="radio-circle"></span> $901.00</div>
        </div>

        <div class="plan-box" id="p1" onclick="selectPlan('p1', '標準版', 788, 'single')">
            <div class="plan-name">標準版</div>
            <div class="plan-desc">最基礎的 Java 版與 Bedrock 版，適合純粹的遠征隊員。</div>
            <div class="plan-price"><span class="radio-circle"></span> $788.00</div>
        </div>

        <div class="footer-btns">
            <button class="btn btn-cart">🛒 購買禮物</button>
            <button class="btn btn-next" onclick="goToPay()">結帳 ></button>
        </div>
    </div>
</div>

<script>
    let selectedInfo = { name: "豪華收藏包", price: 901, mode: "multi" };

    function selectPlan(id, name, price, mode) {
        // 更新視覺樣式
        document.querySelectorAll('.plan-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(id).classList.add('selected');
        
        // 儲存選擇
        selectedInfo = { name, price, mode };
    }

    function goToPay() {
        localStorage.setItem('temp_item', selectedInfo.name);
        localStorage.setItem('temp_price', selectedInfo.price);
        localStorage.setItem('rank', selectedInfo.name); // 儲存方案名稱供遊戲內判斷
        localStorage.setItem('allowed_mode', selectedInfo.mode); // 紀錄是否允許多人
        
        window.location.href = 'payment-method.html';
    }
</script>

</body>
</html>
