<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>方案商店</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        .grid { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 20px auto; }
        .plan { background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 12px; cursor: pointer; text-align: left; }
        .plan:hover { border-color: #58a6ff; }
        .plan h3 { margin: 0; color: #58a6ff; }
        .plan p { margin: 5px 0 0; color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>
    <h1>選擇遠征方案</h1>
    <div class="grid">
        <div class="plan" onclick="buy('學生方案')"><h3>學生方案</h3><p>一般福利</p></div>
        <div class="plan" onclick="buy('基礎方案')"><h3>基礎方案</h3><p>一般福利</p></div>
        <div class="plan" onclick="buy('家庭方案')"><h3>家庭方案</h3><p>多人遊戲 (2-10人)</p></div>
        <div class="plan" onclick="buy('大師方案')"><h3>大師方案</h3><p>多人遊戲 (2-15人)</p></div>
    </div>
    <script>
        function buy(name) {
            // 生成隨機啟動碼 (格式: MC-XXXX)
            const randomCode = "MC-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem('current_code', randomCode);
            localStorage.setItem('rank', name);
            alert(`購買成功！\n您的方案：${name}\n本次啟動碼為：${randomCode}`);
            window.location.href = 'verify.html';
        }
    </script>
</body>
</html>
