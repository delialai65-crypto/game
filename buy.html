<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>方案商店</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: auto; }
        .plan { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; cursor: pointer; }
        .price { color: #2ecc71; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>選擇授權方案</h1>
    <div class="grid">
        <div class="plan" onclick="goPay('學生方案', 90)"><h3>學生方案</h3><div class="price">NT$ 90</div></div>
        <div class="plan" onclick="goPay('基礎方案', 150)"><h3>基礎方案</h3><div class="price">NT$ 150</div></div>
        <div class="plan" onclick="goPay('家庭方案', 230)"><h3>家庭方案</h3><div class="price">NT$ 230</div></div>
        <div class="plan" onclick="goPay('大師方案', 400)"><h3>大師方案</h3><div class="price">NT$ 400</div></div>
    </div>
    <script>
        function goPay(n, p){ localStorage.setItem('temp_item',n); localStorage.setItem('temp_price',p); window.location.href='payment-method.html'; }
    </script>
</body>
</html>
