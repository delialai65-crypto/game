<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>購買方案</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; max-width: 1100px; margin: 50px auto; gap: 40px; }
        .plan-box { background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .plan-box.active { border-color: #2ecc71; background: #21262d; }
        .btn-pay { width: 100%; padding: 15px; background: #2ecc71; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div style="flex:1.2"><img src="https://files.catbox.moe/k3h57k.jpg" width="100%"></div>
    <div style="flex:1">
        <h2>PC 版的 MINECRAFT</h2>
        <div class="plan-box" onclick="sel('大師包', 1126)"><b>大師包</b><br>$1,126.00</div>
        <div class="plan-box active" onclick="sel('豪華包', 901)"><b>豪華包</b><br>$901.00</div>
        <div class="plan-box" onclick="sel('標準版', 788)"><b>標準版</b><br>$788.00</div>
        <button class="btn-pay" onclick="goPay()">結帳 ></button>
    </div>
</div>
<script>
    let p = {n:'豪華包', v:901};
    function sel(n,v){ p={n,v}; document.querySelectorAll('.plan-box').forEach(b=>b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function goPay(){ localStorage.setItem('temp_item',p.n); localStorage.setItem('temp_price',p.v); window.location.href='payment-method.html'; }
</script>
</body>
</html>
