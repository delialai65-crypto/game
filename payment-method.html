<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>選擇支付方式</title>
    <style>
        body { margin: 0; background: #0d1117; color: #fff; font-family: sans-serif; }
        .nav { background: #1a1a1a; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 2px solid #333; position: sticky; top: 0; }
        .super-points { background: rgba(255, 202, 40, 0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid #ffca28; color: #ffca28; font-weight: bold; }
        
        .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .pay-item { background: #161b22; border: 1px solid #333; padding: 20px; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.2s; }
        .pay-item:hover { border-color: #58a6ff; background: #1c2128; }
        .cat-title { color: #58a6ff; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="nav">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" height="25">
    <div class="super-points">🟡 SUPER 點數: <span id="pts">0</span></div>
</div>

<div class="container">
    <h1>選擇支付方式</h1>
    
    <div class="cat-title">電子支付 (5種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="pay('全支付')">全支付</div>
        <div class="pay-item" onclick="pay('LINE Pay')">LINE Pay</div>
        <div class="pay-item" onclick="pay('街口支付')">街口支付</div>
        <div class="pay-item" onclick="pay('悠遊付')">悠遊付</div>
        <div class="pay-item" onclick="pay('橘子支付')">橘子支付</div>
    </div>

    <div class="cat-title">信用卡與其他 (5種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="pay('VISA一次付清')">VISA 一次付清</div>
        <div class="pay-item" onclick="pay('MasterCard')">MasterCard</div>
        <div class="pay-item" onclick="pay('JCB')">JCB</div>
        <div class="pay-item" onclick="pay('銀聯卡')">銀聯卡</div>
        <div class="pay-item" onclick="pay('銀行轉帳')">銀行轉帳</div>
    </div>
</div>

<script>
    // SUPER 點數每秒增加
    let p = parseInt(localStorage.getItem('super_points')) || 0;
    setInterval(() => {
        p++;
        document.getElementById('pts').innerText = p;
        localStorage.setItem('super_points', p);
    }, 1000);

    function pay(m) {
        localStorage.setItem('selected_method', m);
        window.location.href = 'pay.html'; // 進入填寫真實資料的查驗頁
    }
</script>
</body>
</html>
