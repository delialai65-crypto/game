<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>支付中心 - Minecraft 遠征隊</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; }
        .nav { background: #1a1a1a; padding: 15px 40px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .super-pts { color: #ffca28; font-weight: bold; border: 1px solid #ffca28; padding: 5px 15px; border-radius: 20px; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .pay-item { background: #161b22; border: 1px solid #333; padding: 20px; border-radius: 8px; cursor: pointer; text-align: center; }
        .pay-item:hover { border-color: #58a6ff; }
        .points-btn { background: linear-gradient(45deg, #ffca28, #f39c12); color: #000; font-weight: bold; border: none; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="nav">
        <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" height="25">
        <div class="super-pts">🟡 SUPER 點數: <span id="pts-display">0</span></div>
    </div>
    <div class="container">
        <h2>選擇支付方式 (啟動碼方案)</h2>
        <div class="pay-grid">
            <button class="pay-item points-btn" onclick="payWithPoints()">✨ 使用 10,000 SUPER 點數免費兌換</button>
            <div class="pay-item" onclick="alert('導向全支付...')">全支付</div>
            <div class="pay-item" onclick="alert('導向LINE Pay...')">LINE Pay</div>
            <div class="pay-item" onclick="alert('導向街口...')">街口支付</div>
            <div class="pay-item" onclick="alert('導向悠遊付...')">悠遊付</div>
            <div class="pay-item" onclick="alert('導向 Pi 拍錢包...')">Pi 拍錢包</div>
            <div class="pay-item" onclick="alert('導向 VISA...')">VISA / MasterCard</div>
            <div class="pay-item" onclick="alert('導向 JCB...')">JCB</div>
            <div class="pay-item" onclick="alert('導向銀聯...')">銀聯卡</div>
            <div class="pay-item" onclick="alert('導向轉帳...')">銀行轉帳</div>
        </div>
    </div>
    <script>
        let pts = parseInt(localStorage.getItem('super_points')) || 0;
        setInterval(() => { pts++; localStorage.setItem('super_points', pts); document.getElementById('pts-display').innerText = pts; }, 1000);
        function payWithPoints() {
            if(pts >= 10000) { alert("兌換成功！啟動碼為 RYAN0111407"); window.location.href='verify.html'; }
            else { alert("點數不足！還差 " + (10000-pts) + " 點"); }
        }
    </script>
</body>
</html>
