<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選擇支付方式</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 20px; }
        .pay-item { background: #161b22; border: 1px solid #333; padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; }
        .category { text-align: left; margin: 20px 0 10px; color: #58a6ff; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>支付方式</h1>
        <div class="category">行動支付</div>
        <div class="pay-grid">
            <div class="pay-item" onclick="sel('全支付 PX Pay Plus')">🧧 全支付</div>
            <div class="pay-item" onclick="sel('LINE Pay')">🟢 LINE Pay</div>
            <div class="pay-item" onclick="sel('街口支付')">🧧 街口支付</div>
            <div class="pay-item" onclick="sel('Apple Pay')">🍎 Apple Pay</div>
            <div class="pay-item" onclick="sel('Google Pay')">🤖 Google Pay</div>
        </div>
        <div class="category">信用卡</div>
        <div class="pay-grid">
            <div class="pay-item" onclick="sel('信用卡一次付清')">💳 信用卡一次付清</div>
            <div class="pay-item" onclick="sel('信用卡分期')">🏦 信用卡分期</div>
        </div>
        <p>（其他...共16種）</p>
    </div>
    <script>
        function sel(m){ localStorage.setItem('selected_method',m); window.location.href='pay.html'; }
    </script>
</body>
</html>
