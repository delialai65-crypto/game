<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>支付方式</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 40px; text-align: center; }
        .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 900px; margin: auto; }
        .pay-item { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; cursor: pointer; text-align: left; }
        .category { text-align: left; color: #58a6ff; margin: 20px 0 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <h1>選擇支付方式</h1>
    <div class="category">電子支付</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('全支付')">🧧 全支付</div>
        <div class="pay-item" onclick="sel('LINE Pay')">🟢 LINE Pay</div>
        <div class="pay-item" onclick="sel('街口支付')">🧧 街口支付</div>
    </div>
    <div class="category">信用卡</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('信用卡一次付清')">💳 信用卡一次付清</div>
    </div>
    <script>
        function sel(m) { localStorage.setItem('selected_method', m); window.location.href = 'pay.html'; }
    </script>
</body>
</html>
