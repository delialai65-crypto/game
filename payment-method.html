<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選擇支付方式</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 40px; margin: 0; text-align: center; }
        .container { max-width: 900px; margin: auto; }
        h1 { font-size: 32px; margin-bottom: 40px; letter-spacing: 2px; }
        
        .category { text-align: left; color: #58a6ff; margin: 30px 0 10px; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .pay-item { 
            background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; 
            cursor: pointer; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .pay-item:hover { border-color: #58a6ff; background: #1c2128; transform: translateY(-2px); }
        .pay-item span { font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>支付方式</h1>

    <div class="category">行動支付</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('全支付')"><span>🧧</span> 全支付</div>
        <div class="pay-item" onclick="sel('LINE Pay')"><span>🟢</span> LINE Pay</div>
        <div class="pay-item" onclick="sel('街口支付')"><span>🧧</span> 街口支付</div>
        <div class="pay-item" onclick="sel('Apple Pay')"><span>🍎</span> Apple Pay</div>
        <div class="pay-item" onclick="sel('Google Pay')"><span>🤖</span> Google Pay</div>
    </div>

    <div class="category">信用卡</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('信用卡一次付清')"><span>💳</span> 信用卡一次付清</div>
        <div class="pay-item" onclick="sel('信用卡分期')"><span>🏦</span> 信用卡分期</div>
        <div class="pay-item" onclick="sel('銀聯卡')"><span>💠</span> UnionPay 銀聯</div>
    </div>

    <div class="category">銀行轉帳 / ATM</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('網路銀行轉帳')"><span>💻</span> 網路銀行轉帳</div>
        <div class="pay-item" onclick="sel('實體 ATM')"><span>🏧</span> 實體 ATM</div>
        <div class="pay-item" onclick="sel('虛擬帳號')"><span>🔢</span> ATM 虛擬帳號</div>
        <div class="pay-item" onclick="sel('銀行電匯')"><span>🏛️</span> 銀行電匯</div>
    </div>

    <div class="category">超商與點數卡</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="sel('超商代碼繳費')"><span>🏪</span> 超商代碼繳費</div>
        <div class="pay-item" onclick="sel('MyCard 點數')"><span>🃏</span> MyCard 點數</div>
        <div class="pay-item" onclick="sel('GASH 點數')"><span>🎮</span> GASH 點數</div>
        <div class="pay-item" onclick="sel('PayPal')"><span>🅿️</span> PayPal</div>
    </div>

    <p style="margin-top: 40px; color: #8b949e; font-size: 12px;">(已顯示全部 16 種支付方式)</p>
</div>

<script>
    function sel(method) {
        localStorage.setItem('selected_method', method);
        // 如果是購買道具，確保價格已存入
        if(!localStorage.getItem('temp_price')) {
            localStorage.setItem('temp_price', '150'); // 預設價格
        }
        window.location.href = 'pay.html';
    }
</script>

</body>
</html>
