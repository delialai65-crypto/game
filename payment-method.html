<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選擇支付方式 - 遠征隊安全結帳</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .order-summary { background: #161b22; padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #30363d; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .price { color: #2ecc71; font-size: 32px; font-weight: bold; margin-top: 10px; }
        .category-title { text-align: left; margin: 30px 0 15px; color: #58a6ff; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .pay-item { background: #21262d; border: 1px solid #30363d; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 12px; }
        .pay-item:hover { border-color: #58a6ff; background: #30363d; transform: translateY(-3px); }
        .icon { font-size: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h1>安全結帳中心</h1>
    <div class="order-summary">
        <div id="display-plan" style="font-size: 18px; color: #8b949e;">載入方案中...</div>
        <div id="display-price" class="price">NT$ 0</div>
    </div>

    <div class="category-title">行動支付 (5種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('LINE Pay')"><span>🟢</span> LINE Pay</div>
        <div class="pay-item" onclick="selectPay('街口支付')"><span>🧧</span> 街口支付</div>
        <div class="pay-item" onclick="selectPay('Apple Pay')"><span>🍎</span> Apple Pay</div>
        <div class="pay-item" onclick="selectPay('Google Pay')"><span>🤖</span> Google Pay</div>
        <div class="pay-item" onclick="selectPay('Samsung Pay')"><span>📱</span> Samsung Pay</div>
    </div>

    <div class="category-title">信用卡類 (3種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('信用卡 (一次付清)')"><span>💳</span> 信用卡 (一次付清)</div>
        <div class="pay-item" onclick="selectPay('信用卡 (分期付款)')"><span>🏦</span> 信用卡 (分期付款)</div>
        <div class="pay-item" onclick="selectPay('銀聯卡')"><span>💠</span> UnionPay 銀聯</div>
    </div>

    <div class="category-title">銀行轉帳 (3種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('網銀轉帳')"><span>💻</span> 網銀轉帳</div>
        <div class="pay-item" onclick="selectPay('實體 ATM')"><span>🏧</span> 實體 ATM</div>
        <div class="pay-item" onclick="selectPay('虛擬帳號')"><span>🔢</span> ATM 虛擬帳號</div>
    </div>

    <div class="category-title">超商與其他 (4種)</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('超商代碼')"><span>🏪</span> 超商代碼繳費</div>
        <div class="pay-item" onclick="selectPay('MyCard')"><span>🃏</span> MyCard 點數</div>
        <div class="pay-item" onclick="selectPay('GASH')"><span>🎮</span> GASH 點數</div>
        <div class="pay-item" onclick="selectPay('PayPal')"><span>🅿️</span> PayPal</div>
    </div>
</div>

<script>
    document.getElementById('display-plan').innerText = "購買項目：" + (localStorage.getItem('temp_plan') || "基礎方案");
    document.getElementById('display-price').innerText = "NT$ " + (localStorage.getItem('temp_price') || "150");

    function selectPay(method) {
        localStorage.setItem('selected_method', method);
        window.location.href = 'pay.html'; // 統一進入資料填寫頁面
    }
</script>
</body>
</html>
