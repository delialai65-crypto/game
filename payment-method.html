<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選擇支付方式</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .order-box { background: #161b22; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #30363d; }
        .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .pay-item { background: #21262d; border: 1px solid #30363d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 10px; }
        .pay-item:hover { border-color: #58a6ff; background: #30363d; transform: scale(1.02); }
        .category-title { text-align: left; margin: 20px 0 10px; color: #8b949e; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>安全結帳中心</h1>
    <div class="order-box">
        <div id="p-name" style="font-size: 18px;">載入中...</div>
        <div id="p-price" style="color: #2ecc71; font-size: 24px; font-weight: bold;">$0</div>
    </div>

    <div class="category-title">電子支付 / 行動支付</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('LINE Pay')">🟢 LINE Pay</div>
        <div class="pay-item" onclick="selectPay('街口支付')">🧧 街口支付</div>
        <div class="pay-item" onclick="selectPay('Apple Pay')">🍎 Apple Pay</div>
        <div class="pay-item" onclick="selectPay('Google Pay')">🤖 Google Pay</div>
        <div class="pay-item" onclick="selectPay('Samsung Pay')">📱 Samsung Pay</div>
    </div>

    <div class="category-title">信用卡服務</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="window.location.href='pay.html'">💳 信用卡 (一次付清)</div>
        <div class="pay-item" onclick="window.location.href='pay.html'">🏦 信用卡 (分期付款)</div>
        <div class="pay-item" onclick="selectPay('銀聯卡')">💠 UnionPay 銀聯</div>
    </div>

    <div class="category-title">其他支付方式</div>
    <div class="pay-grid">
        <div class="pay-item" onclick="selectPay('網路銀行')">💻 網路銀行轉帳</div>
        <div class="pay-item" onclick="selectPay('虛擬帳號')">🔢 ATM 虛擬帳號</div>
        <div class="pay-item" onclick="selectPay('電匯')">🏛️ 銀行電匯</div>
        <div class="pay-item" onclick="selectPay('超商代碼')">🏪 超商代碼繳費</div>
        <div class="pay-item" onclick="selectPay('MyCard')">🃏 MyCard 點數</div>
        <div class="pay-item" onclick="selectPay('GASH')">🎮 GASH 點數</div>
        <div class="pay-item" onclick="selectPay('PayPal')">🅿️ PayPal</div>
    </div>
</div>

<script>
    const plan = localStorage.getItem('temp_plan') || "基礎方案";
    const price = localStorage.getItem('temp_price') || "150";
    document.getElementById('p-name').innerText = `購買：${plan}`;
    document.getElementById('p-price').innerText = `NT$ ${price}`;

    function selectPay(method) {
        alert(`已鎖定支付方式：${method}\n正在建立加密連線...`);
        setTimeout(() => {
            const randomCode = "MC-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem('current_code', randomCode);
            alert(`✅ 付款成功！啟動碼為：${randomCode}`);
            window.location.href = 'verify.html';
        }, 1500);
    }
</script>
</body>
</html>
