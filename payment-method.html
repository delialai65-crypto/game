<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>Minecraft 遠征隊 - 主選單</title>
    <style>
        body { margin: 0; background: url('https://files.catbox.moe/k3h57k.jpg') center; background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        .btn { width: 400px; padding: 15px; margin: 5px; background: #4e4e4e; border: 2px solid #000; color: white; cursor: pointer; text-align: center; font-weight: bold; text-shadow: 2px 2px #000; }
        .btn:hover { border-color: #fff; background: #6e6e6e; }
        #multi-panel { display: none; position: fixed; background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #2ecc71; border-radius: 10px; color: white; text-align: center; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" width="500">
    <div style="margin-top:20px">
        <div class="btn" onclick="location.href='game.html?mode=single'">單人遊戲</div>
        <div class="btn" onclick="document.getElementById('multi-panel').style.display='block'">多人遊戲 (2-50人)</div>
    </div>

    <div id="multi-panel">
        <h3>設定多人遠征人數</h3>
        <p><span id="p-count" style="font-size:30px; color:#2ecc71;">25</span> 人</p>
        <input type="range" min="2" max="50" value="25" style="width:100%" oninput="document.getElementById('p-count').innerText=this.value">
        <button class="btn" style="width:100%" onclick="startMulti()">開始連線</button>
    </div>

    <script>
        function startMulti() {
            const count = document.querySelector('input[type=range]').value;
            window.location.href = `game.html?mode=multi&players=${count}`;
        }
    </script>
</body>
</html>
