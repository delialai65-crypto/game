<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>啟動您的產品</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .verify-box { background: #1a1a1a; padding: 40px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 400px; }
        input { width: 100%; padding: 15px; font-size: 18px; text-align: center; letter-spacing: 5px; background: #000; color: #2ecc71; border: 2px solid #333; margin: 20px 0; }
        .buy-link { color: #58a6ff; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>
    <div class="verify-box">
        <h2>啟動 Minecraft 遠征授權</h2>
        <p style="color: #8b949e;">請輸入 6 位啟動碼</p>
        <input type="text" id="code" placeholder="XXXXXX" maxlength="6">
        <button onclick="checkCode()" style="width:100%; padding:15px; background:#2ecc71; border:none; cursor:pointer; font-weight:bold;">啟動遊戲</button>
        <p style="margin-top:20px;">不知道啟動碼？ <span class="buy-link" onclick="location.href='buy.html'">前往購買各種方案</span></p>
    </div>
    <script>
        function checkCode() {
            const code = document.getElementById('code').value.toUpperCase();
            if(code === "SUPER") { // 假設正確代碼是 SUPER
                localStorage.setItem('game_active', 'true');
                alert("✅ 啟動成功！");
                window.location.href = 'main-menu.html';
            } else { alert("❌ 無效的啟動碼，請重新輸入或購買方案。"); }
        }
    </script>
</body>
</html>
