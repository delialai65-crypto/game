<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>產品啟動中心</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .nav { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; }
        .super-pts { color: #ffca28; font-weight: bold; border: 1px solid #ffca28; padding: 5px 15px; border-radius: 20px; }
        .card { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 450px; margin: 40px auto; }
        input { width: 80%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #333; color: #2ecc71; text-align: center; font-size: 20px; letter-spacing: 2px; }
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .pay-btn { background: #30363d; font-size: 13px; }
        .points-btn { background: linear-gradient(45deg, #ffca28, #f39c12); color: #000; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="nav">
        <span>Minecraft 遠征系統</span>
        <div class="super-pts">🟡 SUPER 點數: <span id="pts-display">0</span></div>
    </div>

    <div class="card">
        <h2>啟動您的授權</h2>
        <input type="text" id="code" placeholder="請輸入 11 碼啟動碼" maxlength="11">
        <button class="btn" style="width:85%" onclick="checkCode()">啟動遊戲</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
        
        <h3>或是購買方案</h3>
        <div class="pay-grid">
            <button class="btn points-btn" onclick="payWithPoints()">✨ 使用 10,000 點數免費兌換</button>
            <button class="btn pay-btn">全支付</button><button class="btn pay-btn">LINE Pay</button>
            <button class="btn pay-btn">街口支付</button><button class="btn pay-btn">悠遊付</button>
            <button class="btn pay-btn">Pi 拍錢包</button><button class="btn pay-btn">VISA/Master</button>
            <button class="btn pay-btn">JCB</button><button class="btn pay-btn">銀聯卡</button>
            <button class="btn pay-btn">銀行轉帳</button>
        </div>
    </div>

    <script>
        let pts = parseInt(localStorage.getItem('super_points')) || 0;
        setInterval(() => { pts++; localStorage.setItem('super_points', pts); document.getElementById('pts-display').innerText = pts; }, 1000);

        function checkCode() {
            if(document.getElementById('code').value === "RYAN0111407") {
                localStorage.setItem('game_active', 'true');
                alert("✅ 啟動成功！"); location.href='main-menu.html';
            } else { alert("❌ 代碼錯誤！"); }
        }

        function payWithPoints() {
            if(pts >= 10000) { alert("兌換成功！代碼為 RYAN0111407"); }
            else { alert("點數不足！還差 " + (10000-pts) + " 點，請繼續在遊戲中遠征。"); }
        }
    </script>
</body>
</html>
