<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>驗證</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { text-align: center; border: 1px solid #f85149; padding: 40px; border-radius: 20px; }
        input { padding: 15px; font-size: 20px; text-align: center; }
        button { padding: 15px; background: #f85149; color: white; border: none; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>輸入啟動碼</h2>
        <input type="text" id="c" placeholder="MC-XXXX"><br>
        <button onclick="v()">啟動</button>
    </div>
    <script>
        function v(){ if(document.getElementById('c').value.toUpperCase() === localStorage.getItem('current_code')){ window.location.href='game.html'; }else{alert("代碼錯誤");}}
    </script>
</body>
</html>
