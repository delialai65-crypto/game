<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>產品啟動中心</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .nav { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; }
        .super-pts { color: #ffca28; font-weight: bold; border: 1px solid #ffca28; padding: 5px 15px; border-radius: 20px; }
        .card { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 450px; margin: 40px auto; }
        input { width: 85%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #333; color: #2ecc71; text-align: center; font-size: 20px; letter-spacing: 2px; border-radius: 4px; outline: none; }
        input:focus { border-color: #2ecc71; }
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; padding: 12px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #2ea043; }
        .pay-btn { background: #30363d; font-size: 13px; }
        .pay-btn:hover { background: #444c56; border: 1px solid #58a6ff; }
        .points-btn { background: linear-gradient(45deg, #ffca28, #f39c12); color: #000; grid-column: span 2; margin-bottom: 5px; }
        .points-btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="nav">
        <span>Minecraft 遠征系統</span>
        <div class="super-pts">🟡 SUPER 點數: <span id="pts-display">0</span></div>
    </div>

    <div class="card">
        <h2>啟動您的授權</h2>
        <input type="text" id="code" placeholder="請輸入 11 碼啟動碼" maxlength="11">
        <button class="btn" style="width:92%" onclick="checkCode()">啟動遊戲</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
        
        <h3>或是購買方案</h3>
        <div class="pay-grid">
            <button class="btn points-btn" onclick="payWithPoints()">✨ 使用 10,000 點數免費兌換</button>
            
            <button class="btn pay-btn" onclick="handlePayment('全支付')">全支付</button>
            <button class="btn pay-btn" onclick="handlePayment('LINE Pay')">LINE Pay</button>
            <button class="btn pay-btn" onclick="handlePayment('街口支付')">街口支付</button>
            <button class="btn pay-btn" onclick="handlePayment('悠遊付')">悠遊付</button>
            <button class="btn pay-btn" onclick="handlePayment('Pi 拍錢包')">Pi 拍錢包</button>
            <button class="btn pay-btn" onclick="handlePayment('VISA/MasterCard')">VISA / MasterCard</button>
            <button class="btn pay-btn" onclick="handlePayment('JCB')">JCB</button>
            <button class="btn pay-btn" onclick="handlePayment('銀聯卡')">銀聯卡支付</button>
            <button class="btn pay-btn" onclick="handlePayment('銀行轉帳')">銀行轉帳</button>
            <button class="btn pay-btn" onclick="handlePayment('超商代碼')">超商代碼繳費</button>
        </div>
    </div>

    <script>
        // 更新點數顯示
        let pts = parseInt(localStorage.getItem('super_points')) || 0;
        setInterval(() => { 
            pts++; 
            localStorage.setItem('super_points', pts); 
            document.getElementById('pts-display').innerText = pts; 
        }, 1000);

        // 啟動碼驗證
        function checkCode() {
            const inputCode = document.getElementById('code').value;
            if(inputCode === "RYAN0111407") {
                localStorage.setItem('game_active', 'true');
                alert("✅ 啟動成功！授權已綁定至您的帳號。"); 
                window.location.href='main-menu.html';
            } else { 
                alert("❌ 代碼錯誤！請檢查輸入是否正確。"); 
            }
        }

        // 處理 10 種支付方式點擊
        function handlePayment(method) {
            const userName = localStorage.getItem('mc_user') || "冒險者";
            const confirmPay = confirm(`您選擇使用「${method}」購買遠征授權方案。\n\n確認要導向支付頁面嗎？`);
            
            if(confirmPay) {
                alert(`正在為玩家 [${userName}] 建立 ${method} 安全連結...\n付款成功後，啟動碼將自動發送到您的帳號。`);
                // 模擬付款成功後的動作
                setTimeout(() => {
                    alert("模擬付款成功！\n您的啟動碼為：RYAN0111407\n(請複製後回到啟動頁貼上)");
                }, 1500);
            }
        }

        // 點數兌換邏輯
        function payWithPoints() {
            if(pts >= 10000) { 
                const confirmExchange = confirm("確定要消耗 10,000 SUPER 點數兌換啟動碼嗎？");
                if(confirmExchange) {
                    pts -= 10000;
                    localStorage.setItem('super_points', pts);
                    alert("✨ 兌換成功！\n您的專屬啟動碼是：RYAN0111407");
                    document.getElementById('code').value = "RYAN0111407";
                }
            } else { 
                alert("❌ 點數不足！\n您目前有 " + pts + " 點，還差 " + (10000-pts) + " 點。\n請繼續在遊戲中遠征以累積點數。"); 
            }
        }
    </script>
</body>
</html>
