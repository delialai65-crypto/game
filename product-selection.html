<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>選擇你的遊戲 - Minecraft</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .nav { background: #1a1a1a; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .nav-links { display: flex; gap: 30px; font-weight: bold; }
        .nav-links span { cursor: pointer; color: #ccc; font-size: 14px; }
        .nav-links span:hover { color: #fff; text-decoration: underline; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 40px auto; padding: 20px; }
        .card { background: #1a1a1a; border: 2px solid transparent; border-radius: 8px; overflow: hidden; cursor: pointer; text-align: left; }
        .card:hover { border-color: #58a6ff; }
        .card img { width: 100%; }
        .card-info { padding: 15px; }
    </style>
</head>
<body>
<div class="nav">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_logo.svg" height="20" onclick="location.href='product-selection.html'">
    <div class="nav-links">
        <span onclick="checkAccess()">遊戲</span>
        <span onclick="location.href='community.html'">社群</span>
        <span onclick="location.href='learning.html'">學習</span>
        <span>支援</span>
    </div>
    <div>👤 <span id="user-display">帳戶</span></div>
</div>
<h1>選擇你的遊戲</h1>
<div class="game-grid">
    <div class="card" onclick="location.href='buy.html'"><img src="https://files.catbox.moe/k3h57k.jpg"><div class="card-info"><b>Minecraft</b><br><small>沙盒生存</small></div></div>
    <div class="card" style="opacity:0.5"><img src="https://files.catbox.moe/kbe37y.jpg"><div class="card-info"><b>Dungeons</b><br><small>未開放</small></div></div>
</div>
<script>
    document.getElementById('user-display').innerText = localStorage.getItem('mc_user') || "帳戶";
    function checkAccess() {
        if(localStorage.getItem('game_active') === 'true') location.href = 'main-menu.html';
        else { alert("⚠️ 尚未偵測到授權，請先購買遊戲。"); location.href = 'buy.html'; }
    }
</script>
</body>
</html>
